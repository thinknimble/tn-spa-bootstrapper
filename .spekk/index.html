                    var from = positions[terminalNodes[i]];
                    if (from.y === terminusY) {
                        svg += '<line class="metro-dependency" x1="' + from.x + '" y1="' + from.y + '" x2="' + terminusX + '" y2="' + terminusY + '" stroke="#94a3b8" stroke-width="3" opacity="0.4"/>';
                    } else {
                        var midX = (from.x + terminusX) / 2;
                        var midY = (from.y + terminusY) / 2;
                        svg += '<path class="metro-dependency" d="M' + from.x + ',' + from.y + ' Q' + midX + ',' + from.y + ' ' + midX + ',' + midY + ' T' + terminusX + ',' + terminusY + '" fill="none" stroke="#94a3b8" stroke-width="3" opacity="0.4"/>';
                    }
                }

                // Draw terminus node
                svg += '<g class="metro-terminus">';
                svg += '<circle cx="' + terminusX + '" cy="' + terminusY + '" r="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>';
                svg += '<text class="metro-label" x="' + (terminusX + 12) + '" y="' + (terminusY + 4) + '" font-size="11" fill="#94a3b8" font-style="italic">Done</text>';
                svg += '</g>';
            }

            // Draw stations
            for (var i = 0; i < branchAssertions.length; i++) {
                var a = branchAssertions[i];
                var pos = positions[a.id];
                if (!pos) continue;

                var isCurrent = a.id === currentAssertionId;
                var radius = isCurrent ? CURRENT_RADIUS : STATION_RADIUS;
                var fillColor = STATUS_COLORS[a.status] || STATUS_COLORS.not_started;
                var strokeWidth = isCurrent ? 4 : 3;
                var currentClass = isCurrent ? ' metro-station-current' : '';

                svg += '<g class="metro-station' + currentClass + '" data-assertion-id="' + escapeHtml(a.id) + '">';
                svg += '<title>' + escapeHtml(a.title) + ' (' + a.status + ')</title>';
                svg += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + radius + '" fill="' + fillColor + '" stroke="white" stroke-width="' + strokeWidth + '"/>';
                // Truncate label if too long
                var label = a.title;
                if (label.length > 35) {
                    label = label.substring(0, 32) + '...';
                }
                svg += '<text class="metro-label" x="' + (pos.x + LABEL_OFFSET) + '" y="' + (pos.y + 4) + '" font-size="11" fill="#475569">' + escapeHtml(label) + '</text>';
                svg += '</g>';
            }

            svg += '</svg>';
            return svg;
        }

        // Metro map state
        var metroMapState = {
            currentBranch: null,
            panStates: {}
        };

        function updateMetroMap(assertionId, branch) {
            var metroMapSection = document.getElementById('metro-map-section');
            var container = document.getElementById('metro-map-container');
            var branchNameEl = document.getElementById('metro-branch-name');

            metroMapSection.style.display = 'flex';
            branchNameEl.textContent = branch;

            // Get all assertions for this branch
            var byBranch = getAssertionsByBranch();
            var branchAssertions = byBranch[branch] || [];

            if (branchAssertions.length === 0) {
                container.innerHTML = '';
                return;
            }

            // Check if we need to switch branches
            if (metroMapState.currentBranch !== branch) {
                // Generate the SVG for this branch
                var svgHtml = generateMetroMapSVG(assertionId, branchAssertions);
                container.innerHTML = '<div class="metro-map-branch" id="metro-map-' + branch + '" data-branch="' + branch + '">' + svgHtml + '</div>';
                metroMapState.currentBranch = branch;

                // Restore pan state if exists
                var panState = metroMapState.panStates[branch];
                if (panState) {
                    var svg = container.querySelector('.metro-map');
                    if (svg) {
                        svg.style.transform = 'translate(' + panState.currentX + 'px, ' + panState.currentY + 'px)';
                    }
                }
            }

            // Update current station highlight
            var allStations = container.querySelectorAll('.metro-station');
            for (var i = 0; i < allStations.length; i++) {
                var station = allStations[i];
                var stationId = station.getAttribute('data-assertion-id');
                var circle = station.querySelector('circle');
                if (stationId === assertionId) {
                    station.classList.add('metro-station-current');
                    if (circle) {
                        circle.setAttribute('r', '10');
                        circle.setAttribute('stroke-width', '4');
                    }
                } else {
                    station.classList.remove('metro-station-current');
                    if (circle) {
                        circle.setAttribute('r', '8');
                        circle.setAttribute('stroke-width', '3');
                    }
                }
            }
        }

        function hideMetroMap() {
            var metroMapSection = document.getElementById('metro-map-section');
            metroMapSection.style.display = 'none';
        }

        // Initialize the UI
        buildTree();
        buildDetailPanels();

        // Mark completed specs
        function markCompletedSpecs() {
            var specItems = document.querySelectorAll('.spec-item');
            for (var i = 0; i < specItems.length; i++) {
                var specItem = specItems[i];
                var statusBadge = specItem.querySelector('.spec-header .status-badge');
                if (statusBadge && statusBadge.classList.contains('status-done')) {
                    specItem.classList.add('completed');
                }
            }
        }

        // Initialize completed specs toggle
        function initializeCompletedSpecsToggle() {
            var specTree = document.getElementById('spec-tree');
            var toggleCheckbox = document.getElementById('toggle-completed-specs');
            var hiddenCountElement = document.getElementById('hidden-count');

            markCompletedSpecs();

            var showCompleted = localStorage.getItem('spekkShowCompleted') === 'true';
            toggleCheckbox.checked = showCompleted;
            if (showCompleted) {
                specTree.classList.add('show-completed');
            }

            updateHiddenCount();

            toggleCheckbox.addEventListener('change', function() {
                var isChecked = this.checked;
                localStorage.setItem('spekkShowCompleted', isChecked.toString());

                if (isChecked) {
                    specTree.classList.add('show-completed');
                } else {
                    specTree.classList.remove('show-completed');
                }

                updateHiddenCount();
            });
        }

        function updateHiddenCount() {
            var hiddenCountElement = document.getElementById('hidden-count');
            var completedSpecs = document.querySelectorAll('.spec-item.completed');
            var isShowing = document.getElementById('spec-tree').classList.contains('show-completed');

            var completedCount = completedSpecs.length;

            if (completedCount > 0 && !isShowing) {
                hiddenCountElement.textContent = '(' + completedCount + ' completed ' + (completedCount === 1 ? 'spec' : 'specs') + ' hidden)';
            } else {
                hiddenCountElement.textContent = '';
            }
        }

        // Initialize search
        function initializeSearch() {
            var searchInput = document.getElementById('spec-search');
            var specTree = document.getElementById('spec-tree');
            if (!searchInput || !specTree) return;

            var searchExpandedSpecs = [];

            searchInput.addEventListener('input', function() {
                var query = this.value.trim().toLowerCase();
                var specItems = specTree.querySelectorAll('.spec-item');

                if (!query) {
                    for (var i = 0; i < specItems.length; i++) {
                        specItems[i].classList.remove('search-hidden');
                        specItems[i].classList.remove('search-match');
                        var aItems = specItems[i].querySelectorAll('.assertion-item');
                        for (var j = 0; j < aItems.length; j++) {
                            aItems[j].classList.remove('search-hidden');
                        }
                    }
                    // Collapse specs that were auto-expanded by search
                    for (var i = 0; i < searchExpandedSpecs.length; i++) {
                        var specItem = searchExpandedSpecs[i];
                        var assertionsList = specItem.querySelector('.assertions-list');
                        var toggle = specItem.querySelector('.toggle-icon');
                        var header = specItem.querySelector('.spec-header');
                        if (assertionsList) { assertionsList.classList.remove('expanded'); }
                        if (toggle) { toggle.classList.remove('expanded'); toggle.textContent = '\u25B6'; }
                        if (header) { header.classList.remove('expanded'); }
                    }
                    searchExpandedSpecs = [];
                    updateHiddenCount();
                    return;
                }

                for (var i = 0; i < specItems.length; i++) {
                    var specItem = specItems[i];
                    var specSearchText = specItem.getAttribute('data-search-text') || '';
                    var specMatches = specSearchText.indexOf(query) !== -1;
                    var assertionItems = specItem.querySelectorAll('.assertion-item');
                    var anyAssertionMatches = false;

                    for (var j = 0; j < assertionItems.length; j++) {
                        var assertionItem = assertionItems[j];
                        var assertionSearchText = assertionItem.getAttribute('data-search-text') || '';
                        var assertionMatches = assertionSearchText.indexOf(query) !== -1;

                        if (assertionMatches) {
                            assertionItem.classList.remove('search-hidden');
                            anyAssertionMatches = true;
                        } else {
                            assertionItem.classList.add('search-hidden');
                        }
                    }

                    if (specMatches || anyAssertionMatches) {
                        specItem.classList.remove('search-hidden');
                        specItem.classList.add('search-match');

                        if (anyAssertionMatches) {
                            var assertionsList = specItem.querySelector('.assertions-list');
                            var toggle = specItem.querySelector('.toggle-icon');
                            var header = specItem.querySelector('.spec-header');
                            if (assertionsList && !assertionsList.classList.contains('expanded')) {
                                searchExpandedSpecs.push(specItem);
                                assertionsList.classList.add('expanded');
                                if (toggle) { toggle.classList.add('expanded'); toggle.textContent = '\u25BC'; }
                                if (header) { header.classList.add('expanded'); }
                            }
                        }

                        if (specMatches && !anyAssertionMatches) {
                            for (var j = 0; j < assertionItems.length; j++) {
                                assertionItems[j].classList.remove('search-hidden');
                            }
                        }
                    } else {
                        specItem.classList.add('search-hidden');
                        specItem.classList.remove('search-match');
                    }
                }
            });
        }

        // Initialize metro map collapse
        function initializeMetroMapCollapse() {
            var metroMapSection = document.getElementById('metro-map-section');
            var metroMapToggle = document.getElementById('metro-map-toggle');

            var savedHeight = localStorage.getItem('spekkMetroMapHeight');
            if (savedHeight) {
                var h = parseInt(savedHeight, 10);
                if (h >= 100 && h <= 600) {
                    metroMapSection.style.height = h + 'px';
                }
            }

            var isCollapsed = localStorage.getItem('spekkMetroMapCollapsed') === 'true';
            if (isCollapsed) {
                metroMapSection.classList.add('collapsed');
            }

            metroMapToggle.addEventListener('click', function() {
                metroMapSection.classList.toggle('collapsed');
                var collapsed = metroMapSection.classList.contains('collapsed');
                localStorage.setItem('spekkMetroMapCollapsed', collapsed.toString());
            });

            initializeMetroMapResize();
        }

        // Initialize metro map resize
        function initializeMetroMapResize() {
            var metroMapSection = document.getElementById('metro-map-section');
            var resizeHandle = document.getElementById('metro-map-resize-handle');
            if (!resizeHandle || !metroMapSection) return;

            var isDragging = false;
            var startY = 0;
            var startHeight = 0;

            resizeHandle.addEventListener('mousedown', function(e) {
                if (metroMapSection.classList.contains('collapsed')) return;

                isDragging = true;
                startY = e.clientY;
                startHeight = metroMapSection.getBoundingClientRect().height;

                metroMapSection.classList.add('no-transition');
                document.body.style.cursor = 'ns-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;

                var deltaY = e.clientY - startY;
                var newHeight = startHeight + deltaY;
                newHeight = Math.max(100, Math.min(600, newHeight));
                metroMapSection.style.height = newHeight + 'px';
            });

            document.addEventListener('mouseup', function() {
                if (!isDragging) return;
                isDragging = false;
                metroMapSection.classList.remove('no-transition');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                var currentHeight = Math.round(metroMapSection.getBoundingClientRect().height);
                localStorage.setItem('spekkMetroMapHeight', currentHeight.toString());
            });
        }

        // Tooltip handling
        var tooltip = null;

        function createTooltip() {
            if (!tooltip) {
                tooltip = document.createElement('div');
                tooltip.className = 'metro-station-tooltip';
                document.body.appendChild(tooltip);
            }
            return tooltip;
        }

        function positionTooltip(element, tooltipEl) {
            var rect = element.getBoundingClientRect();
            var tooltipRect = tooltipEl.getBoundingClientRect();
            var left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
            var top = rect.top - tooltipRect.height - 10;
            tooltipEl.style.left = left + 'px';
            tooltipEl.style.top = top + 'px';
        }

        document.addEventListener('mouseover', function(event) {
            var station = event.target.closest('.metro-station');
            if (station) {
                var titleElement = station.querySelector('title');
                if (titleElement) {
                    var tooltipEl = createTooltip();
                    tooltipEl.textContent = titleElement.textContent;
                    setTimeout(function() {
                        positionTooltip(station, tooltipEl);
                        tooltipEl.classList.add('visible');
                    }, 0);
                }
            }
        });

        document.addEventListener('mouseout', function(event) {
            var station = event.target.closest('.metro-station');
            if (station) {
                if (tooltip) {
                    tooltip.classList.remove('visible');
                }
            }
        });

        // Metro map pan functionality
        (function() {
            var isPanning = false;
            var startX = 0;
            var startY = 0;

            var mapContainer = document.getElementById('metro-map-container');
            if (!mapContainer) return;

            mapContainer.addEventListener('mousedown', function(e) {
                if (e.target.closest('.metro-station')) return;

                var currentBranch = metroMapState.currentBranch;
                if (!currentBranch) return;

                var svg = mapContainer.querySelector('.metro-map');
                if (!svg) return;

                isPanning = true;

                if (!metroMapState.panStates[currentBranch]) {
                    metroMapState.panStates[currentBranch] = { currentX: 0, currentY: 0 };
                }
                var panState = metroMapState.panStates[currentBranch];

                startX = e.clientX - panState.currentX;
                startY = e.clientY - panState.currentY;
                mapContainer.classList.add('panning');
            });

            document.addEventListener('mousemove', function(e) {
                if (!isPanning) return;

                var currentBranch = metroMapState.currentBranch;
                if (!currentBranch) return;

                var svg = mapContainer.querySelector('.metro-map');
                if (!svg) return;

                var panState = metroMapState.panStates[currentBranch];
                if (!panState) return;

                var newX = e.clientX - startX;
                var newY = e.clientY - startY;

                var containerRect = mapContainer.getBoundingClientRect();
                var svgWidth = parseFloat(svg.getAttribute('width')) || containerRect.width;
                var svgHeight = parseFloat(svg.getAttribute('height')) || containerRect.height;
                var EDGE_MARGIN = 60;

                var minX = Math.min(0, containerRect.width - svgWidth - EDGE_MARGIN);
                var maxX = EDGE_MARGIN;
                var minY = Math.min(0, containerRect.height - svgHeight - EDGE_MARGIN);
                var maxY = EDGE_MARGIN;

                panState.currentX = Math.max(minX, Math.min(maxX, newX));
                panState.currentY = Math.max(minY, Math.min(maxY, newY));

                svg.style.transform = 'translate(' + panState.currentX + 'px, ' + panState.currentY + 'px)';
            });

            document.addEventListener('mouseup', function() {
                if (isPanning) {
                    isPanning = false;
                    mapContainer.classList.remove('panning');
                }
            });

            document.addEventListener('mouseleave', function() {
                if (isPanning) {
                    isPanning = false;
                    mapContainer.classList.remove('panning');
                }
            });

            mapContainer.addEventListener('wheel', function(e) {
                var currentBranch = metroMapState.currentBranch;
                if (!currentBranch) return;

                var svg = mapContainer.querySelector('.metro-map');
                if (!svg) return;

                if (!metroMapState.panStates[currentBranch]) {
                    metroMapState.panStates[currentBranch] = { currentX: 0, currentY: 0 };
                }
                var panState = metroMapState.panStates[currentBranch];

                var containerRect = mapContainer.getBoundingClientRect();
                var svgWidth = parseFloat(svg.getAttribute('width')) || containerRect.width;
                var svgHeight = parseFloat(svg.getAttribute('height')) || containerRect.height;
                var EDGE_MARGIN = 60;

                var minX = Math.min(0, containerRect.width - svgWidth - EDGE_MARGIN);
                var maxX = EDGE_MARGIN;
                var minY = Math.min(0, containerRect.height - svgHeight - EDGE_MARGIN);
                var maxY = EDGE_MARGIN;

                if (e.shiftKey) {
                    panState.currentX = Math.max(minX, Math.min(maxX, panState.currentX - e.deltaY));
                } else {
                    panState.currentY = Math.max(minY, Math.min(maxY, panState.currentY - e.deltaY));
                    panState.currentX = Math.max(minX, Math.min(maxX, panState.currentX - e.deltaX));
                }

                svg.style.transform = 'translate(' + panState.currentX + 'px, ' + panState.currentY + 'px)';
                e.preventDefault();
            }, { passive: false });
        })();

        // Event delegation for clicks
        document.addEventListener('click', function(event) {
            var actionElement = event.target.closest('[data-action]');
            if (!actionElement) return;
            var action = actionElement.getAttribute('data-action');

            if (action === 'toggle-spec') {
                var specId = actionElement.getAttribute('data-spec-id');
                if (specId) {
                    toggleSpec(specId);
                    if (actionElement.getAttribute('data-show-detail') === 'true') {
                        showDetail(specId, 'spec', event);
                    }
                }
            } else if (action === 'show-detail') {
                var assertionId = actionElement.getAttribute('data-assertion-id');
                var type = actionElement.getAttribute('data-type');
                if (assertionId && type) {
                    showDetail(assertionId, type, event);
                }
            }
        });

        // Metro station clicks (navigate to assertion detail)
        document.addEventListener('click', function(event) {
            var station = event.target.closest('.metro-station');
            if (!station) return;
            var assertionId = station.getAttribute('data-assertion-id');
            if (assertionId) {
                showDetail(assertionId, 'assertion', event);
            }
        });

        function toggleSpec(specId) {
            var toggle = document.getElementById('toggle-' + specId);
            var assertionsList = document.getElementById('assertions-' + specId);
            if (!toggle || !assertionsList) return;
            var header = toggle.parentElement;

            if (assertionsList.classList.contains('expanded')) {
                assertionsList.classList.remove('expanded');
                toggle.classList.remove('expanded');
                header.classList.remove('expanded');
                toggle.textContent = '\u25B6';
            } else {
                assertionsList.classList.add('expanded');
                toggle.classList.add('expanded');
                header.classList.add('expanded');
                toggle.textContent = '\u25BC';
            }
        }

        function showDetail(id, type, event) {
            // Hide all detail content
            var allDetails = document.querySelectorAll('.detail-content');
            for (var i = 0; i < allDetails.length; i++) {
                allDetails[i].classList.remove('active');
            }
            var emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';

            // Remove selection from all items
            var allAssertions = document.querySelectorAll('.assertion-item');
            for (var i = 0; i < allAssertions.length; i++) {
                allAssertions[i].classList.remove('selected');
            }

            // Show selected content
            var detailElement = document.getElementById('detail-' + type + '-' + id);
            if (detailElement) {
                detailElement.classList.add('active');
            }

            // Update metro map for assertions, hide for specs
            if (type === 'assertion' && detailElement) {
                var branch = detailElement.getAttribute('data-branch') || 'main';
                updateMetroMap(id, branch);
            } else {
                hideMetroMap();
            }

            // Mark assertion as selected in tree view
            if (type === 'assertion') {
                var assertionItem = document.querySelector('.assertion-item[data-assertion-id="' + id + '"]');
                if (assertionItem) {
                    assertionItem.classList.add('selected');

                    // Expand parent spec if collapsed
                    var assertionsListEl = assertionItem.closest('.assertions-list');
                    if (assertionsListEl && !assertionsListEl.classList.contains('expanded')) {
                        var specIdFromList = assertionsListEl.id.replace('assertions-', '');
                        var toggle = document.getElementById('toggle-' + specIdFromList);
                        if (toggle) {
                            var header = toggle.parentElement;
                            assertionsListEl.classList.add('expanded');
                            toggle.classList.add('expanded');
                            header.classList.add('expanded');
                            toggle.textContent = '\u25BC';
                        }
                    }
                }
            }

            // Mark spec header as selected
            if (type === 'spec') {
                var allSpecHeaders = document.querySelectorAll('.spec-header');
                for (var i = 0; i < allSpecHeaders.length; i++) {
                    allSpecHeaders[i].classList.remove('selected');
                }

                var toggleElement = document.getElementById('toggle-' + id);
                if (toggleElement) {
                    var specHeader = toggleElement.parentElement;
                    specHeader.classList.add('selected');
                }
            }
        }

        // Initialize everything
        initializeCompletedSpecsToggle();
        initializeMetroMapCollapse();
        initializeSearch();
        initializeBranchFilter();

    })();
    </script>
</body>
</html>
