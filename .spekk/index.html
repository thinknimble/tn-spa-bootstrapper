ment/PR environments can still override `debug` to `\"True\"` via `terraform.tfvars` or the deploy workflow","branch":"feature/aws-fargate","created":"2026-07-21T00:00:00Z"},{"id":"tf-debug-description-accurate","parent":"template-quality-security-fixes","title":"Terraform: debug Variable Description Matches This Project","status":"draft","priority":3,"file":"specs/template-quality-security-fixes/assertions/tf-debug-description-accurate.md","content":"# Terraform: debug Variable Description Matches This Project\n\n## What Must Be True\n\nThe `description` field of the `debug` variable in `variables.tf` accurately describes its purpose in this project (controlling Django debug mode), not a copy-pasted description from another project.\n\n## Context\n\n`variables.tf` line 63 describes `debug` as related to a \"billflow service backend,\" which is a different project. This is a copy-paste artifact that confuses anyone reading the Terraform configuration.\n\n## Success Criteria\n\n- The `debug` variable description references Django or this project's backend, not \"billflow\" or any other project name\n- The description accurately conveys what the variable controls (e.g., \"Enable Django DEBUG mode for the application\")","branch":"feature/aws-fargate","created":"2026-07-21T00:00:00Z"},{"id":"tf-no-hardcoded-region","parent":"template-quality-security-fixes","title":"Terraform: No Hardcoded us-east-1 Region in Resource Configurations","status":"draft","priority":3,"file":"specs/template-quality-security-fixes/assertions/tf-no-hardcoded-region.md","content":"# Terraform: No Hardcoded us-east-1 Region in Resource Configurations\n\n## What Must Be True\n\nAll `.tf` files under `terraform/` use `var.region` or a data source for AWS region references. No subnet filters, log configurations, or other resource attributes contain a hardcoded `us-east-1` string.\n\n## Context\n\n`main.tf` lines 59 and 69, `app.tf` line 152, and `worker/main.tf` line 25 hardcode `us-east-1` in subnet availability zone filters and CloudWatch log configurations. Deploying to any other AWS region breaks these resources silently or with confusing errors.\n\n## Success Criteria\n\n- No `.tf` file under `terraform/` contains the literal string `us-east-1` in resource or data source blocks\n- Subnet availability zone filters use `var.region` or `data.aws_region.current` with appropriate suffix patterns\n- CloudWatch log group region references use `var.region` or `data.aws_region.current`\n- `terraform plan` succeeds when `var.region` is set to a non-us-east-1 value (e.g., `us-west-2`)\n- Provider-level region configuration (if any) is excluded from this check -- only resource/data blocks","branch":"feature/aws-fargate","created":"2026-07-21T00:00:00Z"},{"id":"tf-playwright-password-secrets-manager","parent":"template-quality-security-fixes","title":"Terraform: PLAYWRIGHT_TEST_USER_PASS Uses Secrets Manager, Not Plain Environment","status":"draft","priority":1,"file":"specs/template-quality-security-fixes/assertions/tf-playwright-password-secrets-manager.md","content":"# Terraform: PLAYWRIGHT_TEST_USER_PASS Uses Secrets Manager, Not Plain Environment\n\n## What Must Be True\n\n`app.tf` injects `PLAYWRIGHT_TEST_USER_PASS` via the ECS task definition `secrets` block (using a Secrets Manager ARN) rather than the plain `environment` block. All sensitive values marked `sensitive = true` in `variables.tf` are consistently delivered through Secrets Manager.\n\n## Context\n\n`app.tf` lines 107-110 pass `PLAYWRIGHT_TEST_USER_PASS` as a plain `environment` variable despite `variables.tf` marking it `sensitive = true`. Other secrets in the same container definition correctly use the `secrets` block with Secrets Manager ARNs. This means the Playwright password appears in the ECS task definition JSON in plain text and is visible in the AWS Console.\n\n## Success Criteria\n\n- `PLAYWRIGHT_TEST_USER_PASS` is not present in any `environment` block in `app.tf`\n- `PLAYWRIGHT_TEST_USER_PASS` is injected via the `secrets` block using a Secrets Manager ARN, consistent with other sensitive values\n- A corresponding Secrets Manager resource or data source exists for the Playwright password\n- `terraform plan` produces no errors related to the Playwright password configuration\n- No variable marked `sensitive = true` in `variables.tf` is passed via a plain `environment` block in any ECS task definition","branch":"feature/aws-fargate","created":"2026-07-21T00:00:00Z"},{"id":"tf-rollbar-secret-injected-or-removed","parent":"template-quality-security-fixes","title":"Terraform: Rollbar Token Is Either Injected Into Container or Resource Is Removed","status":"draft","priority":3,"file":"specs/template-quality-security-fixes/assertions/tf-rollbar-secret-injected-or-removed.md","content":"# Terraform: Rollbar Token Is Either Injected Into Container or Resource Is Removed\n\n## What Must Be True\n\nThe Rollbar token Secrets Manager resource in `secrets.tf` is either (a) injected into the ECS container definition via the `secrets` block in `app.tf`, or (b) removed entirely along with the corresponding variable declaration. No dead Secrets Manager resources exist that are created but never consumed.\n\n## Context\n\n`secrets.tf` lines 66-75 create a Rollbar token in Secrets Manager and `variables.tf` declares the corresponding variable, but `app.tf` container definition never references or injects this secret. The resource is provisioned on every deploy, incurring cost, but is never used by the application.\n\n## Success Criteria\n\n- One of the following is true:\n  - The Rollbar token Secrets Manager resource is referenced in `app.tf`'s container definition `secrets` block with the environment variable `ROLLBAR_TOKEN` (or equivalent), OR\n  - The Rollbar token resource is removed from `secrets.tf`, and the corresponding variable is removed from `variables.tf`\n- No Secrets Manager resource exists in `secrets.tf` that is not referenced by at least one container definition\n- `terraform validate` passes after the change","branch":"feature/aws-fargate","created":"2026-07-21T00:00:00Z"},{"id":"auto-detect-traefik","parent":"traefik-multi-project-routing","title":"Auto-Detect Traefik: `just up` Applies Overlay When `proxy` Network Exists","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/auto-detect-traefik.md","content":"# Auto-Detect Traefik: `just up` Applies Overlay When `proxy` Network Exists\n\n## What Must Be True\n\n`just up` supports two fully equal modes:\n\n- **Standalone mode (default):** If the `proxy` Docker network does NOT exist, use `docker-compose.override.yml` (port bindings). No Traefik infrastructure is touched.\n- **Traefik mode:** If the `proxy` Docker network exists, call `just setup-traefik` first (ensuring Traefik is running), then apply `compose/docker-compose.traefik.yml`.\n\nStandalone mode must remain a fully supported first-class path. `just up` must NOT create the `proxy` network or install Traefik infrastructure unless the user has already opted in by running `just setup-traefik` themselves.\n\n## Implementation\n\n```just\nup:\n    #!/usr/bin/env bash\n    project=$(just _project)\n    if docker network inspect proxy \u003e/dev/null 2\u003e\u00261; then\n      just setup-traefik\n      PROJECT=$project docker compose -f docker-compose.yaml -f compose/docker-compose.traefik.yml up -d\n    else\n      PROJECT=$project docker compose up -d\n    fi\n    echo \"Application is starting (PROJECT=$project)...\"\n```\n\nThe key distinction from the previous implementation: `setup-traefik` is called **inside** the `if` branch (only when the proxy network already exists), NOT as a recipe dependency (which would run unconditionally).\n\n## Key Properties\n\n- **Zero config** — no `.env` entry, no manual file switching\n- **Standalone is the default** — fresh clone + `just up` uses port bindings, no Traefik required\n- **Traefik opt-in** — user runs `just setup-traefik` once to enter Traefik mode; from then on `just up` is self-healing\n- **Reversible** — remove the `proxy` network and `just up` falls back to standalone automatically\n\n## Success Criteria\n\n- ✅ `just up` without `proxy` network: uses port bindings, does NOT create proxy network, does NOT start Traefik\n- ✅ `just up` with `proxy` network: calls `setup-traefik`, then applies traefik overlay\n- ✅ No `.env` changes required to switch modes\n- ✅ Fresh `git clone` + `just up` works with zero Traefik infrastructure\n- ✅ If Traefik container was stopped but `proxy` network exists, `just up` restarts Traefik automatically","branch":"main","dependsOn":"traefik-setup-docs","created":"2026-03-19T00:00:00Z"},{"id":"base-compose-project-namespace","parent":"traefik-multi-project-routing","title":"Base Compose: PROJECT Variable Namespacing","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/base-compose-project-namespace.md","content":"# Base Compose: PROJECT Variable Namespacing\n\n## What Must Be True\n\nThe `{{cookiecutter.project_slug}}/docker-compose.yaml` template uses `${PROJECT}` variable to ensure container and network namespacing.\n\n## Usage\n\nUse `${PROJECT}` in **at least one** of these ways:\n\n### Option 1: Container Names (Recommended)\n\n```yaml\nservices:\n  server:\n    container_name: ${PROJECT}-server\n  client:\n    container_name: ${PROJECT}-client\n  postgres:\n    container_name: ${PROJECT}-postgres\n  redis:\n    container_name: ${PROJECT}-redis\n```\n\n### Option 2: Compose Project Name\n\nVia `.env` file:\n```\nCOMPOSE_PROJECT_NAME=${PROJECT}\n```\n\n### Option 3: Traefik Labels Only\n\nAlready covered by `base-compose-traefik-labels` — labels use `${PROJECT}` for router naming.\n\n## Rationale\n\nPrevents naming collisions when multiple projects run simultaneously. Each project's containers have unique names/networks.\n\n## Success Criteria\n\n- ✅ Two projects with different `PROJECT` values can run concurrently\n- ✅ Container names include project identifier\n- ✅ No \"container name already in use\" errors when starting multiple projects\n- ✅ `docker ps` clearly shows which containers belong to which project","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"base-compose-remove-ports","parent":"traefik-multi-project-routing","title":"Base Compose: Remove Port Mappings","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/base-compose-remove-ports.md","content":"# Base Compose: Remove Port Mappings\n\n## What Must Be True\n\nThe `{{cookiecutter.project_slug}}/docker-compose.yaml` template removes all `ports:` mappings from all services.\n\n## Services Affected\n\n- `server` — remove `ports: [\"8000:8000\", \"5678:5678\"]`\n- `client` — remove `ports: [\"8080:8080\"]`\n- `postgres` — remove `ports: [\"5432:5432\"]`\n- `redis` — remove `ports: [\"6379:6379\"]`\n\n## Rationale\n\nPort mappings move to `docker-compose.override.yml` to:\n1. Enable Traefik mode without port conflicts\n2. Preserve standalone mode via auto-loaded override file\n3. Keep base template identical across all projects\n\n## Success Criteria\n\n- ✅ `docker-compose.yaml` defines no `ports:` sections\n- ✅ Services still have `expose:` directives if needed (for documentation)\n- ✅ Standalone mode still works (via override file restoring ports)\n- ✅ Traefik mode has no host port exposure","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"base-compose-traefik-labels","parent":"traefik-multi-project-routing","title":"Traefik Overlay: Labels and Network","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/base-compose-traefik-labels.md","content":"# Traefik Overlay: Labels and Network\n\n## What Must Be True\n\n`compose/docker-compose.traefik.yml` contains Traefik labels for `server` and `client` services. Labels are NOT in `docker-compose.yaml` — they are applied only when Traefik is present.\n\n## Labels Required\n\n### Server Service (Backend API)\n\n```yaml\nservices:\n  server:\n    networks:\n      - default\n      - proxy\n    labels:\n      - \"traefik.enable=true\"\n      - \"traefik.docker.network=proxy\"\n      - \"traefik.http.routers.${PROJECT}-api.rule=Host(`api.${PROJECT}.localhost`)\"\n      - \"traefik.http.routers.${PROJECT}-api.entrypoints=web\"\n      - \"traefik.http.services.${PROJECT}-api.loadbalancer.server.port=8000\"\n```\n\n### Client Service (Frontend)\n\n```yaml\nservices:\n  client:\n    networks:\n      - default\n      - proxy\n    environment:\n      - VITE_DEV_BACKEND_URL=http://api.${PROJECT}.localhost\n      - VITE_HMR_HOST=${PROJECT}.localhost\n    labels:\n      - \"traefik.enable=true\"\n      - \"traefik.docker.network=proxy\"\n      - \"traefik.http.routers.${PROJECT}-web.rule=Host(`${PROJECT}.localhost`)\"\n      - \"traefik.http.routers.${PROJECT}-web.entrypoints=web\"\n      - \"traefik.http.services.${PROJECT}-web.loadbalancer.server.port=8080\"\n```\n\n## Key Properties\n\n- **Overlay only** — labels live in `compose/docker-compose.traefik.yml`, not `docker-compose.yaml`\n- `traefik.docker.network=proxy` tells Traefik which network to use for routing\n- `VITE_HMR_HOST` enables correct Vite HMR WebSocket connection through the proxy\n- Labels have no effect when the overlay is not applied (standalone mode)\n\n## Success Criteria\n\n- ✅ Labels in `compose/docker-compose.traefik.yml`, not `docker-compose.yaml`\n- ✅ Labels use `${PROJECT}` for dynamic routing\n- ✅ Server accessible at `api.${PROJECT}.localhost` in Traefik mode\n- ✅ Client accessible at `${PROJECT}.localhost` in Traefik mode\n- ✅ Port specifications match actual service ports (8080 for client, 8000 for server)","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"docker-test-recipes","parent":"traefik-multi-project-routing","title":"Docker-Based Test Recipes","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/docker-test-recipes.md","content":"# Docker-Based Test Recipes\n\n## What Must Be True\n\nThe justfile includes Docker-based test recipes that work in both standalone and Traefik mode.\n\n## Problem\n\nIn Traefik mode, postgres has no host port binding (no `docker-compose.override.yml`). The existing `server-test` recipe runs pytest on the host connecting to `127.0.0.1:5432`, which is unreachable. Tests fail silently or with a connection error.\n\n## Required Recipes\n\n```just\n# Run server tests inside Docker (works in both standalone and Traefik mode)\n[group('server')]\nserver-test-docker:\n    docker compose exec -w /app/server server pytest\n\n# Run client tests inside Docker\n[group('client')]\nclient-test-docker:\n    docker compose exec client npm run test\n\n# Run all tests inside Docker\n[group('all')]\ntest-docker: server-test-docker client-test-docker\n    @echo \"✅ All tests complete (Docker)\"\n```\n\n### Why `-w /app/server`\n\nThe server container's `WORKDIR` is `/app` but the Django project lives in `/app/server`. Without `-w /app/server`, pytest can't find the Django project and fails with `No module named '\u003cproject\u003e'`.\n\n## Success Criteria\n\n- ✅ `just server-test-docker` runs pytest inside the server container\n- ✅ `just client-test-docker` runs `npm run test` inside the client container\n- ✅ `just test-docker` runs both in sequence\n- ✅ All three recipes work with both standalone and Traefik mode (no host port dependency)\n- ✅ Recipes are in the appropriate `[group('...')]` sections\n- ✅ Existing `server-test` and `client-test` (host-based) recipes are preserved for standalone-only use","branch":"main","created":"2026-03-26T00:00:00Z"},{"id":"env-compose-file-variable","parent":"traefik-multi-project-routing","title":"SUPERSEDED: Environment: COMPOSE_FILE Variable","status":"draft","priority":1,"file":"specs/traefik-multi-project-routing/assertions/env-compose-file-variable.md","content":"# SUPERSEDED: Environment: COMPOSE_FILE Variable\n\n## Status\n\nThis assertion is superseded by the auto-detection approach. `COMPOSE_FILE` is no longer used to toggle Traefik mode.\n\n## New Behavior\n\n`just up` detects whether the `proxy` Docker network exists at runtime and automatically applies the appropriate compose files:\n\n- **Proxy network absent:** `docker compose up -d` (loads `docker-compose.yaml` + `docker-compose.override.yml`)\n- **Proxy network present:** `docker compose -f docker-compose.yaml -f compose/docker-compose.traefik.yml up -d`\n\nNo `.env` entry or manual file switching required. See `auto-detect-traefik` assertion.","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"env-project-variable","parent":"traefik-multi-project-routing","title":"Environment: PROJECT Variable","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/env-project-variable.md","content":"# Environment: PROJECT Variable\n\n## What Must Be True\n\nThe `{{cookiecutter.project_slug}}/.env.example` file includes a `PROJECT` variable with a descriptive placeholder value.\n\n## Required Content\n\n```\nPROJECT=myproject\n```\n\nOr use a more descriptive placeholder:\n```\nPROJECT=project-name\n```\n\n## Usage\n\nThe `PROJECT` variable:\n- Namespaces container names: `${PROJECT}-server`, `${PROJECT}-client`\n- Creates unique Traefik routes: `${PROJECT}.localhost`, `api.${PROJECT}.localhost`\n- Prevents naming collisions when running multiple projects\n\n## Developer Workflow\n\n1. Copy `.env.example` to `.env`\n2. Set `PROJECT=actual-project-name` (e.g., `PROJECT=ecommerce`)\n3. Containers become `ecommerce-server`, `ecommerce-client`\n4. Access via `ecommerce.localhost`, `api.ecommerce.localhost`\n\n## Success Criteria\n\n- ✅ Variable exists in `.env.example`\n- ✅ Placeholder value is descriptive (not empty, not just \"project\")\n- ✅ Comment explains the variable's purpose (optional but helpful)\n- ✅ Two projects with different PROJECT values can run simultaneously","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"override-client-server-url","parent":"traefik-multi-project-routing","title":"Standalone Client Reaches Server Over the Compose Network","status":"done","priority":2,"file":"specs/traefik-multi-project-routing/assertions/override-client-server-url.md","content":"# Standalone Client Reaches Server Over the Compose Network\n\n## What Must Be True\n\nIn standalone mode (`docker-compose.override.yml`, no Traefik) the client runs in\nits own container. `http://localhost:8000` inside that container resolves to the\n**client** container, not the server, so dev requests to the backend fail. The\noverride must point the client's dev backend URL at the server's compose service\nDNS name so the client container reaches the server over the default compose\nnetwork.\n\nThis is a container-networking correctness property (not a version bump): a\nregression back to `localhost` silently breaks the client → server call in\nstandalone Docker dev. It is the standalone-mode counterpart to the Traefik\noverlay, which routes the client to the server via the project-scoped hostname.\n\n## Success Criteria\n\n- ✅ `docker-compose.override.yml` sets the client's dev backend URL to the server's compose service name (`http://server:8000`), not `http://localhost:8000`\n- ✅ In standalone mode the client container can reach the server over the compose network","branch":"fix/issues-495-496-497-499","created":"2026-07-13T00:00:00Z"},{"id":"override-file-exists","parent":"traefik-multi-project-routing","title":"Override File: Creation","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/override-file-exists.md","content":"# Override File: Creation\n\n## What Must Be True\n\nThe file `{{cookiecutter.project_slug}}/docker-compose.override.yml` exists as a template in the bootstrapper and is created when projects are generated.\n\n## File Location\n\n```\n{{cookiecutter.project_slug}}/docker-compose.override.yml\n```\n\n## Cookiecutter Integration\n\nThe file must be:\n1. Present in the cookiecutter template directory\n2. Included in file generation (not excluded by `.gitignore` or cookiecutter config)\n3. Created with proper YAML syntax\n\n## Success Criteria\n\n- ✅ File exists in template\n- ✅ File is generated when running `cookiecutter` command\n- ✅ File is valid YAML\n- ✅ File is version-controlled (not in template's `.gitignore`)","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"override-port-mappings","parent":"traefik-multi-project-routing","title":"Override File: Port Mappings","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/override-port-mappings.md","content":"# Override File: Port Mappings\n\n## What Must Be True\n\nThe `docker-compose.override.yml` file defines all port mappings that were removed from the base `docker-compose.yaml`.\n\n## Required Content\n\n```yaml\nservices:\n  client:\n    ports:\n      - \"8080:8080\"\n\n  server:\n    ports:\n      - \"8000:8000\"\n      - \"5678:5678\"  # debugpy\n\n  postgres:\n    ports:\n      - \"5432:5432\"\n\n  redis:\n    ports:\n      - \"6379:6379\"\n```\n\n## Port Mappings\n\nMatch current bootstrapper defaults:\n- **Client:** 8080 (frontend dev server)\n- **Server:** 8000 (Django/backend), 5678 (debugpy for remote debugging)\n- **Postgres:** 5432 (standard PostgreSQL)\n- **Redis:** 6379 (standard Redis)\n\n## Auto-Loading Behavior\n\nDocker Compose automatically loads `docker-compose.override.yml` when:\n- No `COMPOSE_FILE` environment variable is set\n- File exists in the same directory as `docker-compose.yaml`\n\n## Success Criteria\n\n- ✅ All four services have port mappings\n- ✅ Ports match current bootstrapper defaults\n- ✅ File is auto-loaded in standalone mode\n- ✅ `docker-compose config` shows port mappings when override is loaded\n- ✅ `docker-compose config` shows NO port mappings when COMPOSE_FILE excludes override","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"project-derived-from-branch","parent":"traefik-multi-project-routing","title":"PROJECT Derived from Git Branch at Runtime","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/project-derived-from-branch.md","content":"# PROJECT Derived from Git Branch at Runtime\n\n## What Must Be True\n\nThe justfile includes a `_project` helper that derives `PROJECT` from the current git branch name at runtime. `just up` and `just down` use this value rather than reading `PROJECT` from `.env`.\n\n## Branch-to-PROJECT Mapping\n\n| Branch | PROJECT |\n|--------|---------|\n| `main` | `\u003cslug\u003e-main` |\n| `feature/my-thing` | `\u003cslug\u003e-my-thing` |\n| `fix/auth_bug` | `\u003cslug\u003e-auth-bug` |\n\nRules: strip a leading branch-type prefix (`word/` or `word_`), lowercase, slashes/underscores → hyphens, strip non-`[a-z0-9-]` chars, prefix with project slug.\n\nThis branch→name rule is the single source of truth for both `_project` (operates on the current branch) and `just worktree` (operates on its `\u003cbranch\u003e` argument — see `worktree-command`). A worktree's directory name therefore equals its container `PROJECT` namespace.\n\n## Implementation\n\n```just\n[private]\n_project:\n    #!/usr/bin/env bash\n    branch=$(git rev-parse --abbrev-ref HEAD 2\u003e/dev/null || echo \"main\")\n    if [ \"$branch\" = \"main\" ]; then\n      echo \"{{cookiecutter.project_slug}}-main\"\n    else\n      stripped=$(echo \"$branch\" | sed 's|^[a-zA-Z][a-zA-Z0-9]*[/_]||')\n      echo \"{{cookiecutter.project_slug}}-$(echo \"$stripped\" | tr '[:upper:]' '[:lower:]' | tr '/_' '-' | sed 's/[^a-z0-9-]//g')\"\n    fi\n```\n\n## Success Criteria\n\n- ✅ `_project` recipe exists and is private\n- ✅ `just up` passes `PROJECT=$(just _project)` inline to `docker compose`\n- ✅ `just down` uses the same runtime PROJECT so teardown matches startup\n- ✅ Two worktrees on different branches get different PROJECT values\n- ✅ `PROJECT` in `.env` is not required for `just up` to work","branch":"main","created":"2026-03-19T00:00:00Z"},{"id":"readme-multi-project-section","parent":"traefik-multi-project-routing","title":"Documentation: Multi-Project Development Section","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/readme-multi-project-section.md","content":"# Documentation: Multi-Project Development Section\n\n## What Must Be True\n\nThe generated `{{cookiecutter.project_slug}}/README.md` includes a section explaining both operational modes and the worktree workflow.\n\n## Required Content\n\n### Section: Multi-Project Development\n\n1. **Standalone Mode (Default)**\n   - No configuration needed — `just up` works out of the box\n   - Access via `localhost:8080` (frontend), `localhost:8000` (backend)\n   - Port bindings come from `docker-compose.override.yml`\n\n2. **Traefik Mode (Multiple Projects Simultaneously)**\n   - Provision Traefik once: `just setup-traefik`\n   - Then `just up` auto-detects Traefik and switches to hostname routing\n   - `PROJECT` derived from git branch name automatically\n   - Access via `http://${PROJECT}.localhost` / `http://api.${PROJECT}.localhost`\n   - No host port conflicts — run as many projects as needed\n\n3. **Worktree Workflow**\n   - `just worktree add \u003cbranch\u003e` — creates isolated worktree + Docker stack\n   - `just worktree remove \u003cbranch\u003e` — tears down stack + removes worktree\n   - Each worktree gets its own `PROJECT` from branch name\n\n## Success Criteria\n\n- ✅ Both modes explained clearly\n- ✅ `just setup-traefik` mentioned as the provisioning step\n- ✅ Auto-detection behavior described (no manual file switching)\n- ✅ Worktree workflow documented\n- ✅ Example PROJECT values shown","branch":"main","dependsOn":"traefik-setup-docs","created":"2026-03-13T12:00:00Z"},{"id":"test-multi-project-concurrent","parent":"traefik-multi-project-routing","title":"Testing: Multiple Projects Concurrently","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/test-multi-project-concurrent.md","content":"# Testing: Multiple Projects Concurrently\n\n## What Must Be True\n\nMultiple generated projects (or worktrees) can run simultaneously in Traefik mode without conflicts.\n\n## Test Prerequisites\n\n- Traefik provisioned: `just setup-traefik`\n\n## Option A: Two separate generated projects\n\n1. **Generate two projects:**\n   ```bash\n   cookiecutter \u003cbootstrapper-path\u003e  # project slug: alpha\n   cookiecutter \u003cbootstrapper-path\u003e  # project slug: beta\n   ```\n\n2. **Start both (on main branch, each gets its own PROJECT):**\n   ```bash\n   cd ~/projects/alpha \u0026\u0026 just up   # PROJECT=alpha-main\n   cd ~/projects/beta  \u0026\u0026 just up   # PROJECT=beta-main\n   ```\n\n3. **Verify both running:**\n   ```bash\n   docker ps | grep -E \"(alpha|beta)\"\n   # Should show containers for both projects\n   ```\n\n4. **Access both projects:**\n   - `http://alpha-main.localhost` — Alpha frontend\n   - `http://api.alpha-main.localhost` — Alpha API\n   - `http://beta-main.localhost` — Beta frontend\n   - `http://api.beta-main.localhost` — Beta API\n\n5. **Clean up:**\n   ```bash\n   cd ~/projects/alpha \u0026\u0026 just down\n   cd ~/projects/beta  \u0026\u0026 just down\n   ```\n\n## Option B: Worktrees within one project\n\n1. **Create a worktree:**\n   ```bash\n   just worktree add feature/experiment\n   ```\n\n2. **Start both stacks:**\n   ```bash\n   just up                                         # PROJECT=\u003cslug\u003e-main\n   (cd ../\u003cslug\u003e-experiment \u0026\u0026 just up)            # PROJECT=\u003cslug\u003e-experiment\n   ```\n\n3. **Verify both accessible at unique hostnames with no port conflicts.**\n\n4. **Clean up:**\n   ```bash\n   just worktree remove feature/experiment\n   just down\n   ```\n\n## Success Criteria\n\n- ✅ Both stacks start without errors\n- ✅ No port conflicts during startup\n- ✅ All services accessible via unique hostnames\n- ✅ Container names clearly differentiate projects (include PROJECT prefix)\n- ✅ Traefik routes to correct project based on hostname\n- ✅ Projects are fully isolated (separate databases, separate containers)","branch":"main","dependsOn":"auto-detect-traefik","created":"2026-03-13T12:00:00Z"},{"id":"traefik-allowed-hosts","parent":"traefik-multi-project-routing","title":"Traefik Overlay Sets `ALLOWED_HOSTS` for Project Hostnames","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/traefik-allowed-hosts.md","content":"# Traefik Overlay Sets `ALLOWED_HOSTS` for Project Hostnames\n\n## What Must Be True\n\nIn Traefik mode a project (or worktree) is reached at hostnames derived from its\n`PROJECT` — `${PROJECT}.localhost`, `api.${PROJECT}.localhost` — and the client\ncontainer reaches the server over the shared proxy network by its project-scoped\ncontainer name (`${PROJECT}-server`). Django rejects any request whose `Host`\nheader is not in `ALLOWED_HOSTS`, so behind Traefik the server would return\n`DisallowedHost` for exactly these requests.\n\nThe Traefik overlay (`compose/docker-compose.traefik.yml`) therefore sets the\nserver's `ALLOWED_HOSTS` to the project's own hostnames, keyed on `${PROJECT}`.\nBecause `PROJECT` is unique per worktree, each isolated stack accepts requests at\n**its own** hostnames — the server is reachable behind Traefik and reachable\nfrom its own client container.\n\n## Success Criteria\n\n- ✅ The Traefik overlay sets `ALLOWED_HOSTS` on the `server` service, derived from `${PROJECT}`\n- ✅ The list covers the Traefik-routed hostnames (`${PROJECT}.localhost`, `api.${PROJECT}.localhost`) and the project-scoped container name (`${PROJECT}-server`)\n- ✅ A worktree's server accepts requests at its own project hostnames behind Traefik (no `DisallowedHost`)\n- ✅ Two concurrent worktrees each accept only their own hostnames — the values track each worktree's unique `PROJECT`","branch":"fix/issues-495-496-497-499","created":"2026-07-13T00:00:00Z"},{"id":"traefik-file-exists","parent":"traefik-multi-project-routing","title":"Traefik Overlay File: Creation","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/traefik-file-exists.md","content":"# Traefik Overlay File: Creation\n\n## What Must Be True\n\nThe file `{{cookiecutter.project_slug}}/compose/docker-compose.traefik.yml` exists as a template in the bootstrapper and is created when projects are generated.\n\n## File Location\n\n```\n{{cookiecutter.project_slug}}/compose/docker-compose.traefik.yml\n```\n\nNote: File moved from root-level `docker-compose.traefik.yml` to `compose/` subdirectory to co-locate with other Dockerfile assets and distinguish it from the auto-loaded `docker-compose.override.yml`.\n\n## Success Criteria\n\n- ✅ File exists in template at `compose/docker-compose.traefik.yml`\n- ✅ File is generated when running `cookiecutter` command\n- ✅ File is valid YAML\n- ✅ File is version-controlled (not in template's `.gitignore`)","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"traefik-proxy-network","parent":"traefik-multi-project-routing","title":"Traefik File: Proxy Network Definition","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/traefik-proxy-network.md","content":"# Traefik File: Proxy Network Definition\n\n## What Must Be True\n\nThe `docker-compose.traefik.yml` file declares the `proxy` network as an external network.\n\n## Required Content\n\n```yaml\nnetworks:\n  proxy:\n    external: true\n```\n\n## Behavior\n\n- **External:** The network must already exist (created manually via `docker network create proxy`)\n- **Shared:** All projects connect to the same network instance\n- **Traefik routing:** Traefik must also be attached to this network to route traffic\n\n## Why External\n\nUnlike project-specific networks, the `proxy` network is shared infrastructure. It persists across project startups/shutdowns and enables Traefik to route to any running project.\n\n## Success Criteria\n\n- ✅ Network declared as `external: true`\n- ✅ Network named `proxy` (matches documentation and Traefik setup)\n- ✅ `docker-compose up` fails with clear error if network doesn't exist\n- ✅ Error message guides user to create network: `docker network create proxy`","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"traefik-service-networks","parent":"traefik-multi-project-routing","title":"Traefik File: Service Network Attachments","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/traefik-service-networks.md","content":"# Traefik File: Service Network Attachments\n\n## What Must Be True\n\nThe `docker-compose.traefik.yml` file attaches `server` and `client` services to both the `default` network and the external `proxy` network.\n\n## Required Content\n\n```yaml\nservices:\n  server:\n    networks:\n      - default\n      - proxy\n\n  client:\n    networks:\n      - default\n      - proxy\n```\n\n## Network Purposes\n\n- **default:** Internal compose network for postgres/redis communication\n- **proxy:** Shared external network for Traefik routing\n\n## Why Both Networks\n\nServices need:\n1. **default** network to communicate with postgres, redis (internal services)\n2. **proxy** network to be reachable by Traefik for HTTP routing\n\nInternal services (postgres, redis) stay on default network only — they don't need Traefik routing.\n\n## Success Criteria\n\n- ✅ `server` and `client` services attached to both networks\n- ✅ `postgres` and `redis` services NOT attached to proxy (remain on default only)\n- ✅ Server can connect to postgres via `DB_HOST=postgres` (default network)\n- ✅ Traefik can route to server/client via proxy network\n- ✅ No network connectivity errors between services","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"traefik-setup-docs","parent":"traefik-multi-project-routing","title":"Traefik Setup: `just setup-traefik` Command","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/traefik-setup-docs.md","content":"# Traefik Setup: `just setup-traefik` Command\n\n## What Must Be True\n\nThe justfile includes a `setup-traefik` recipe that idempotently provisions the shared Traefik gateway, including auto-generating `~/traefik/docker-compose.yml` if it doesn't exist.\n\n## Required Behavior\n\n```bash\njust setup-traefik\n```\n\n1. Creates the `proxy` Docker network if it doesn't exist\n2. Auto-generates `~/traefik/docker-compose.yml` if it doesn't exist (from a known-good template)\n3. Starts the Traefik container if not already running\n4. Is idempotent — safe to run multiple times\n5. Prints status messages for each step\n\n## Template to Generate\n\nIf `~/traefik/docker-compose.yml` doesn't exist, create it with this exact content:\n\n```yaml\nnetworks:\n  proxy:\n    external: true\n\nservices:\n  traefik:\n    image: traefik:v3.6\n    container_name: traefik\n    restart: unless-stopped\n    command:\n      - \"--api.insecure=true\"\n      - \"--providers.docker=true\"\n      - \"--providers.docker.exposedbydefault=false\"\n      - \"--providers.docker.network=proxy\"\n      - \"--entrypoints.web.address=:80\"\n    ports:\n      - \"80:80\"\n      - \"9090:8080\"\n    volumes:\n      - \"/var/run/docker.sock:/var/run/docker.sock\"\n    networks:\n      - proxy\n```\n\n### Why these values\n\n| Setting | Value | Reason |\n|---------|-------|--------|\n| Image | `traefik:v3.6` | v2.x and v3.0–v3.5 use Docker API v1.24 which is rejected by Docker Engine 29+ (minimum v1.44). v3.6+ added automatic API version negotiation. Older versions fail silently. |\n| Dashboard port | `9090:8080` | Avoids conflict with `docker-compose.override.yml` which binds the client to port `8080` in standalone mode. |\n| Socket mount | No `:ro` | Some Docker Desktop for Mac configurations have issues with read-only socket mounts. Dropping `:ro` improves cross-platform compatibility. |\n\n## Implementation\n\n```just\nsetup-traefik:\n    #!/usr/bin/env bash\n    set -e\n\n    TRAEFIK_DIR=\"$HOME/traefik\"\n\n    # 1. Ensure proxy network\n    if ! docker network inspect proxy \u003e/dev/null 2\u003e\u00261; then\n      echo \"Creating 'proxy' Docker network...\"\n      docker network create proxy\n    else\n      echo \"'proxy' network already exists, skipping\"\n    fi\n\n    # 2. Auto-generate ~/traefik/docker-compose.yml if missing\n    if [ ! -f \"$TRAEFIK_DIR/docker-compose.yml\" ]; then\n      echo \"Creating $TRAEFIK_DIR/docker-compose.yml...\"\n      mkdir -p \"$TRAEFIK_DIR\"\n      cat \u003e \"$TRAEFIK_DIR/docker-compose.yml\" \u003c\u003c 'YAML'\n    networks:\n      proxy:\n        external: true\n\n    services:\n      traefik:\n        image: traefik:v3.6\n        container_name: traefik\n        restart: unless-stopped\n        command:\n          - \"--api.insecure=true\"\n          - \"--providers.docker=true\"\n          - \"--providers.docker.exposedbydefault=false\"\n          - \"--providers.docker.network=proxy\"\n          - \"--entrypoints.web.address=:80\"\n        ports:\n          - \"80:80\"\n          - \"9090:8080\"\n        volumes:\n          - \"/var/run/docker.sock:/var/run/docker.sock\"\n        networks:\n          - proxy\n    YAML\n    else\n      echo \"$TRAEFIK_DIR/docker-compose.yml already exists, skipping\"\n    fi\n\n    # 3. Start Traefik if not already running\n    if docker inspect traefik \u003e/dev/null 2\u003e\u00261; then\n      echo \"Traefik container already exists, skipping\"\n    else\n      echo \"Starting Traefik gateway...\"\n      docker compose -f \"$TRAEFIK_DIR/docker-compose.yml\" up -d\n      echo \"Traefik running — dashboard at http://localhost:9090\"\n    fi\n```\n\n## Success Criteria\n\n- ✅ `just setup-traefik` creates `proxy` network if missing\n- ✅ `just setup-traefik` creates `~/traefik/docker-compose.yml` if missing, using the exact template above\n- ✅ `just setup-traefik` does not overwrite an existing `~/traefik/docker-compose.yml`\n- ✅ `just setup-traefik` starts Traefik if not running\n- ✅ Running it twice does not error (idempotent)\n- ✅ After running, `just up` auto-detects Traefik and applies the overlay\n- ✅ Traefik dashboard accessible at `http://localhost:9090` after setup","branch":"main","created":"2026-03-13T12:00:00Z"},{"id":"vite-hmr-traefik","parent":"traefik-multi-project-routing","title":"Vite HMR Behind Traefik","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/vite-hmr-traefik.md","content":"# Vite HMR Behind Traefik\n\n## What Must Be True\n\nThe React client's `vite.config.ts` configures HMR to connect through the Traefik proxy when `VITE_HMR_HOST` is set, using `clientPort: 80` so the browser connects on the proxy's port rather than Vite's internal port.\n\n## Implementation\n\n```typescript\nhmr: env.VITE_HMR_HOST\n  ? { host: env.VITE_HMR_HOST, clientPort: 80, protocol: 'ws' }\n  : undefined,\n```\n\n## Why `clientPort` Not `port`\n\n- `port: 80` would tell Vite to start its WebSocket server on port 80 inside the container (privileged, wrong)\n- `clientPort: 80` tells only the browser to connect on port 80 — Vite still listens on 8080 where Traefik routes traffic\n\n## Environment Variable\n\n`VITE_HMR_HOST` is set in `compose/docker-compose.traefik.yml`:\n```yaml\nclient:\n  environment:\n    - VITE_HMR_HOST=${PROJECT}.localhost\n```\n\nIt is absent in standalone mode, so the `hmr` config is `undefined` and Vite uses its default behavior.\n\n## Success Criteria\n\n- ✅ `vite.config.ts` reads `VITE_HMR_HOST` from env\n- ✅ When set, HMR uses `clientPort: 80` and `protocol: 'ws'`\n- ✅ When unset, HMR config is `undefined` (standalone mode unaffected)\n- ✅ No WebSocket errors in browser console when running behind Traefik\n- ✅ File changes trigger hot reload in both standalone and Traefik modes","branch":"main","created":"2026-03-19T00:00:00Z"},{"id":"worktree-command","parent":"traefik-multi-project-routing","title":"Worktree Command: `just worktree add/remove \u003cbranch\u003e`","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/worktree-command.md","content":"# Worktree Command: `just worktree add/remove \u003cbranch\u003e`\n\n## What Must Be True\n\nThe justfile includes a `worktree` recipe that manages git worktrees with isolated Docker stacks.\n\n## Usage\n\n```bash\njust worktree add \u003cbranch\u003e     # create worktree + run setup\njust worktree remove \u003cbranch\u003e  # stop Docker stack + remove worktree\n```\n\n## Directory Naming\n\nThe worktree directory slug is derived from the `\u003cbranch\u003e` argument using the\n**exact same rule** as the `_project` helper (see `project-derived-from-branch`):\nstrip a leading branch-type prefix (`word/` or `word_`), lowercase,\nslashes/underscores → hyphens, strip non-`[a-z0-9-]` chars, then prefix with the\nproject slug. This makes the worktree directory name equal the container\n`PROJECT` namespace, so `../\u003cname\u003e/` and its Docker stack share one identifier.\n\nThe only difference from `_project` is the input: the rule operates on the\n`\u003cbranch\u003e` **argument** (the target branch), not the currently-checked-out\nbranch.\n\n| `\u003cbranch\u003e` argument | Directory (and PROJECT) |\n|---------------------|-------------------------|\n| `main`              | `../\u003cslug\u003e-main/`       |\n| `feature/my-thing`  | `../\u003cslug\u003e-my-thing/`   |\n| `fix/auth_bug`      | `../\u003cslug\u003e-auth-bug/`   |\n| `feature/x`         | `../\u003cslug\u003e-x/`          |\n\n## `add` Behavior\n\n1. Creates git worktree at `../\u003cname\u003e/`, where `\u003cname\u003e` is derived from the\n   `\u003cbranch\u003e` argument per **Directory Naming** above\n2. Creates branch if it doesn't exist; checks out existing branch if it does\n3. Runs `just setup-dev` in the new worktree\n4. Prints instructions for starting the stack\n\n## `remove` Behavior\n\n1. Runs `just down` in the worktree to stop Docker services\n2. Runs `git worktree remove --force` to delete the directory\n3. Does NOT delete the branch (prints reminder)\n\n## Success Criteria\n\n- ✅ `just worktree add feature/x` creates worktree at `../\u003cslug\u003e-x/` (leading `feature/` prefix stripped)\n- ✅ Directory name equals the container `PROJECT` namespace for the same branch\n- ✅ Creates branch if it doesn't exist\n- ✅ Checks out existing branch without error\n- ✅ `just worktree remove feature/x` stops services and removes directory\n- ✅ Branch remains after remove (user must delete manually)\n- ✅ Two worktrees on different branches run concurrently without port conflicts","branch":"main","created":"2026-03-19T00:00:00Z"},{"id":"worktree-env-isolation","parent":"traefik-multi-project-routing","title":"Worktree `.env` Isolation","status":"done","priority":1,"file":"specs/traefik-multi-project-routing/assertions/worktree-env-isolation.md","content":"# Worktree `.env` Isolation\n\n## What Must Be True\n\nA fresh git worktree does **not** inherit the parent's `.env` — worktrees only\ncarry tracked files, and `.env` is untracked. With no `.env`, `just setup-dev`\nand `just up` in the new worktree fail: Docker Compose has no database\ncredentials or app config to interpolate. So `just worktree add \u003cbranch\u003e` must\nseed the new worktree with its **own** `.env`, copied from the parent\nworktree's `.env` (falling back to `.env.example` when the parent has none).\n\n**Container and database isolation between worktrees does not come from that\n`.env`.** It is already delivered by mechanisms established in\n`project-derived-from-branch` and `worktree-command`:\n\n- Each worktree lives in its own directory (`../\u003cslug\u003e-\u003cname\u003e/`), so Docker\n  Compose uses a distinct project name and gives each worktree its **own** named\n  postgres data volume — the data is physically separate.\n- `just up` names every container `${PROJECT}-*` from the branch-derived\n  `PROJECT`, so two worktrees never share a postgres (or any) container.\n\nBecause the two stacks run **separate postgres containers backed by separate\nvolumes**, they stay isolated even when their `.env` files carry identical\n`DB_NAME` and `PROJECT`. Patching those two values for isolation is therefore\nunnecessary — a builder may normalize them in the seeded `.env` for cosmetic\nconsistency, but isolation must not depend on it, and this assertion does not\nrequire it.\n\nThe one value that genuinely must be worktree-specific is the e2e target:\n\n- **`PLAYWRIGHT_TEST_BASE_URL`** — must point at the worktree's **own** hostname\n  (`http://${PROJECT}.localhost` behind Traefik), so the worktree's Playwright\n  suite exercises its own stack rather than another worktree's or a stale\n  default (`http://localhost:8080`).\n\nThe worktree hostname is derived from the **same branch→name rule** used by\n`worktree-command` and `project-derived-from-branch` (strip the leading\nbranch-type prefix, lowercase, normalize separators). The exact\nstring-construction is a builder detail; what must hold is that the seeded\nvalue is unique per worktree and consistent with that rule.\n\n## Illustrative Values\n\nFor project slug `myapp` and `\u003cbranch\u003e` argument `feature/auth_bug`\n(directory `../myapp-auth-bug/`):\n\n| `.env` key                 | Seeded value                                                            |\n|----------------------------|------------------------------------------------------------------------|\n| `PLAYWRIGHT_TEST_BASE_URL` | the worktree's own project hostname (`http://myapp-auth-bug.localhost`) |\n\n## Success Criteria\n\n- ✅ After `just worktree add \u003cbranch\u003e`, the new worktree contains its own `.env`\n- ✅ `.env` is seeded from the parent `.env`, or from `.env.example` when no parent `.env` exists\n- ✅ `PLAYWRIGHT_TEST_BASE_URL` in the seeded `.env` targets the worktree's own hostname, not a shared/default one\n- ✅ Two worktrees on different branches run their stacks concurrently with no container-name collisions\n- ✅ The two worktrees use separate postgres containers backed by separate data volumes — migrate/seed in one does not touch the other, even when `DB_NAME` matches\n- ✅ Each worktree's Playwright suite targets its own stack","branch":"fix/issues-495-496-497-499","dependsOn":"worktree-command","created":"2026-07-13T00:00:00Z"}]};</script>

    <script>
    (function() {
        'use strict';

        var DATA = window.__SPEKK_DATA__;
        if (!DATA) return;

        var specs = DATA.specs || [];
        var assertions = DATA.assertions || [];
        var projectName = DATA.projectName || 'Project';

        // Cross-branch / merge-preview mode metadata (see helpers below).
        var crossBranchMode = DATA.crossBranch === true;
        var crossBranchDegraded = DATA.degraded === true;
        var crossBranchBranches = DATA.branches || [];

        // ===== Branch selection (client-side contribution filter) =====
        // We persist the DESELECTED set (not the selected set) so a branch newly
        // appearing in the data defaults to selected, and a removed branch simply
        // drops out. Keyed per project in localStorage.
        var cbDeselectKey = 'spekkCrossBranchDeselected:' + projectName;
        var cbDeselected = {};
        (function loadDeselected() {
            try {
                var raw = localStorage.getItem(cbDeselectKey);
                if (!raw) return;
                var arr = JSON.parse(raw);
                if (Object.prototype.toString.call(arr) === '[object Array]') {
                    var present = {};
                    for (var i = 0; i < crossBranchBranches.length; i++) present[crossBranchBranches[i]] = true;
                    for (var j = 0; j < arr.length; j++) {
                        if (present[arr[j]]) cbDeselected[arr[j]] = true; // prune vanished branches
                    }
                }
            } catch (e) { /* ignore malformed storage */ }
        })();

        function cbSaveDeselected() {
            var arr = [];
            for (var b in cbDeselected) { if (cbDeselected[b]) arr.push(b); }
            try { localStorage.setItem(cbDeselectKey, JSON.stringify(arr)); } catch (e) { /* ignore */ }
        }

        function cbIsSelected(branch) { return !cbDeselected[branch]; }

        // Contributions for an item, restricted to currently-selected branches.
        function cbFilteredContribs(item) {
            if (!item || !item.crossBranch) return [];
            var out = [];
            for (var k = 0; k < item.crossBranch.length; k++) {
                if (cbIsSelected(item.crossBranch[k].branch)) out.push(item.crossBranch[k]);
            }
            return out;
        }

        // A local item is always visible; a foreign item is visible only while at
        // least one of its contributing branches is selected.
        function cbAssertionVisible(a) {
            return !a.foreign || cbFilteredContribs(a).length > 0;
        }
        function cbSpecVisible(spec) {
            if (!spec.foreign) return true;
            if (cbFilteredContribs(spec).length > 0) return true;
            var kids = assertionsByParent[spec.id] || [];
            for (var i = 0; i < kids.length; i++) {
                if (cbAssertionVisible(kids[i])) return true;
            }
            return false;
        }

        // Spec-level rollup recomputed from the selected branches: the worst state
        // across the spec's own filtered contributions and those of its assertions.
        function cbSpecSummary(spec) {
            var worst = cbWorstState(cbFilteredContribs(spec));
            var kids = assertionsByParent[spec.id] || [];
            for (var i = 0; i < kids.length; i++) {
                var s = cbWorstState(cbFilteredContribs(kids[i]));
                if (s && (CB_PRECEDENCE[s] || 0) > (CB_PRECEDENCE[worst] || 0)) worst = s;
            }
            return worst;
        }

        // Whether the conflict driving a spec's rollup is an unconfirmed (degraded)
        // one, across the spec's own and its assertions' selected contributions.
        function cbSpecSummaryUnconfirmed(spec) {
            if (cbHasUnconfirmedConflict(cbFilteredContribs(spec))) return true;
            var kids = assertionsByParent[spec.id] || [];
            for (var i = 0; i < kids.length; i++) {
                if (cbHasUnconfirmedConflict(cbFilteredContribs(kids[i]))) return true;
            }
            return false;
        }

        // Index assertions by parent
        var assertionsByParent = {};
        var assertionById = {};
        for (var i = 0; i < assertions.length; i++) {
            var a = assertions[i];
            assertionById[a.id] = a;
            if (!assertionsByParent[a.parent]) {
                assertionsByParent[a.parent] = [];
            }
            assertionsByParent[a.parent].push(a);
        }

        // Index specs by id
        var specById = {};
        for (var i = 0; i < specs.length; i++) {
            specById[specs[i].id] = specs[i];
        }

        // Set page title
        document.title = 'Spec Explorer - ' + projectName;

        // Build header
        var headerTitle = document.getElementById('header-title');
        headerTitle.textContent = 'Spec Tree - ' + projectName;

        var headerStats = document.getElementById('header-stats');
        headerStats.textContent = specs.length + ' specs, ' + assertions.length + ' assertions';

        // Render cross-branch banner / degraded notice (no-op when off).
        var bannerSlot = document.getElementById('cross-branch-banner-slot');
        if (bannerSlot && crossBranchMode) {
            bannerSlot.innerHTML = cbBannerHtml();
        }

        // Escape HTML
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Status emoji for detail badges
        function statusEmoji(status) {
            switch (status) {
                case 'done': return '\u2705';
                case 'in_progress': return '\uD83D\uDD04';
                case 'failed': return '\u274C';
                case 'not_started': return '\u25CB';
                case 'draft': return '\u23F8\uFE0F';
                default: return '\u25CB';
            }
        }

        // ===== Cross-branch helpers =====

        // Human-readable label for a cross-branch state.
        function cbStateLabel(state) {
            switch (state) {
                case 'incoming_add': return 'Incoming add';
                case 'incoming_mod': return 'Incoming change';
                case 'conflict': return 'Conflict';
                case 'incoming_del': return 'Incoming delete';
                default: return state || '';
            }
        }

        // True when a contribution represents an unconfirmed (degraded) conflict.
        function cbIsUnconfirmedConflict(contrib) {
            return contrib && contrib.state === 'conflict' && contrib.degraded === true;
        }

        // CSS suffix used for row treatment. A degraded conflict gets its own
        // unconfirmed treatment, distinct from a confirmed conflict.
        function cbRowClassFor(state, unconfirmed) {
            if (state === 'conflict' && unconfirmed) return 'cb-row-conflict-unconfirmed';
            return 'cb-row-' + state;
        }

        // Full human-readable label for a state, including the unconfirmed variant.
        function cbStateLabelFull(state, unconfirmed) {
            if (state === 'conflict' && unconfirmed) return 'Possible conflict';
            return cbStateLabel(state);
        }

        // Render a single cross-branch state badge as an ICON ONLY (the glyph comes
        // from the .cb-<state>::before rule). The human-readable label is exposed
        // via the title tooltip rather than inline text, keeping the tree compact;
        // the detail panel shows the words (see cbContributionsHtml).
        function cbBadgeHtml(state, unconfirmed) {
            if (!state) return '';
            var cls = 'cb-badge cb-' + state;
            if (state === 'conflict' && unconfirmed) cls += ' cb-unconfirmed';
            var label = cbStateLabelFull(state, unconfirmed);
            return '<span class="' + cls + '" title="' + escapeHtml(label) + '"></span>';
        }

        // Status CSS suffix that falls back to a neutral "unknown" badge instead of
        // an empty, box-shadow-only one when status is missing.
        function statusClass(status) {
            return status ? status : 'unknown';
        }

        // Rollup precedence matching internal/show worseState: conflict beats
        // incoming_del beats incoming_add beats incoming_mod.
        var CB_PRECEDENCE = { incoming_mod: 1, incoming_add: 2, incoming_del: 3, conflict: 4 };

        // Worst (highest-precedence) state across a contribution list.
        function cbWorstState(contribs) {
            var worst = '';
            if (!contribs) return worst;
            for (var k = 0; k < contribs.length; k++) {
                var s = contribs[k].state;
                if (!worst || (CB_PRECEDENCE[s] || 0) > (CB_PRECEDENCE[worst] || 0)) {
                    worst = s;
                }
            }
            return worst;
        }

        // Does any contribution in the list represent an unconfirmed conflict?
        function cbHasUnconfirmedConflict(contribs) {
            if (!contribs) return false;
            for (var k = 0; k < contribs.length; k++) {
                if (cbIsUnconfirmedConflict(contribs[k])) return true;
            }
            return false;
        }

        // Render the per-branch contribution breakdown for the detail panel.
        // Lists each (branch -> state), and for status drift shows old -> new.
        function cbContributionsHtml(contribs) {
            if (!crossBranchMode || !contribs || contribs.length === 0) return '';
            var h = '<div class="cb-contributions">';
            h += '<div class="cb-contrib-title">Cross-branch contributions</div>';
            for (var k = 0; k < contribs.length; k++) {
                var c = contribs[k];
                var unconfirmed = cbIsUnconfirmedConflict(c);
                h += '<div class="cb-contrib-row">';
                h += '<span class="cb-contrib-branch">' + escapeHtml(c.branch || '') + '</span>';
                h += cbBadgeHtml(c.state, unconfirmed);
                h += '<span class="cb-contrib-label">' + escapeHtml(cbStateLabelFull(c.state, unconfirmed)) + '</span>';
                if (c.state === 'incoming_mod' && (c.oldStatus || c.newStatus)) {
                    h += '<span class="cb-contrib-drift">';
                    h += '<code>' + escapeHtml(c.oldStatus || '—') + '</code>';
                    h += '<span class="cb-drift-arrow">→</span>';
                    h += '<code>' + escapeHtml(c.newStatus || '—') + '</code>';
                    h += '</span>';
                }
                if (unconfirmed) {
                    h += '<span class="cb-contrib-unconfirmed-note">unconfirmed (git &lt; 2.38)</span>';
                }
                h += '</div>';
            }
            h += '</div>';
            return h;
        }

        // Banner naming the compared branches, shown at the top of the tree
        // panel when cross-branch mode is active.
        function cbBannerHtml() {
            if (!crossBranchMode) return '';
            var h = '<div class="cross-branch-banner">';
            h += '<span class="cb-banner-icon">🔀</span>'; /* twisted arrows */
            h += '<div>';
            h += '<div class="cb-banner-title">Cross-branch preview</div>';
            h += '<div class="cb-banner-text">Comparing the current branch against ';
            if (crossBranchBranches.length === 0) {
                h += 'other branches.';
            } else {
                h += '<br>';
                for (var k = 0; k < crossBranchBranches.length; k++) {
                    var bn = crossBranchBranches[k];
                    var chipCls = 'cb-branch-chip' + (cbIsSelected(bn) ? '' : ' cb-chip-deselected');
                    h += '<span class="' + chipCls + '" data-branch="' + escapeHtml(bn) + '">' + escapeHtml(bn) + '</span>';
                }
                h += cbBranchFilterHtml();
            }
            h += '</div></div></div>';

            if (crossBranchDegraded) {
                h += '<div class="cross-branch-degraded">';
                h += '<span class="cb-degraded-icon">⚠️</span>';
                h += '<div>Conflict detection is unavailable (git &lt; 2.38). Results are '
                    + 'classification-only — conflicts shown are <strong>potential</strong>, not confirmed.</div>';
                h += '</div>';
            }
            return h;
        }

        // Checkbox dropdown to deselect branches. The menu is built once; toggling a
        // checkbox filters contributions client-side and persists to localStorage.
        function cbBranchFilterHtml() {
            var selected = 0;
            for (var i = 0; i < crossBranchBranches.length; i++) {
                if (cbIsSelected(crossBranchBranches[i])) selected++;
            }
            var h = '<span class="cb-branch-filter">';
            h += '<button type="button" class="cb-branch-toggle" id="cb-branch-toggle" aria-expanded="false">';
            h += 'Branches <span id="cb-branch-count">(' + selected + '/' + crossBranchBranches.length + ')</span>';
            h += ' <span class="cb-branch-caret">▼</span></button>';
            h += '<div class="cb-branch-menu" id="cb-branch-menu" hidden>';
            h += '<div class="cb-menu-actions">';
            h += '<button type="button" class="cb-menu-action" data-cb-menu="all">Select all</button>';
            h += '<button type="button" class="cb-menu-action" data-cb-menu="none">Deselect all</button>';
            h += '</div>';
            for (var k = 0; k < crossBranchBranches.length; k++) {
                var bn = crossBranchBranches[k];
                h += '<label><input type="checkbox" class="cb-branch-checkbox" data-branch="' + escapeHtml(bn) + '"'
                    + (cbIsSelected(bn) ? ' checked' : '') + '> ' + escapeHtml(bn) + '</label>';
            }
            h += '</div></span>';
            return h;
        }

        // Re-render the tree and detail panels after a branch-selection change,
        // preserving expansion, the active detail, and scroll so toggling a branch
        // is non-disruptive. All recomputation is client-side from data already in
        // the page (no server round-trip).
        function cbApplyBranchSelection() {
            // Capture UI state.
            var expanded = {};
            document.querySelectorAll('.assertions-list.expanded').forEach(function(el) {
                expanded[el.id.replace('assertions-', '')] = true;
            });
            var activeDetail = document.querySelector('.detail-content.active');
            var activeId = activeDetail ? activeDetail.id : null;
            var treePanel = document.querySelector('.tree-panel');
            var scrollTop = treePanel ? treePanel.scrollTop : 0;

            buildTree();
            buildDetailPanels();
            markCompletedSpecs();
            updateHiddenCount();

            // Restore expansion.
            Object.keys(expanded).forEach(function(specId) {
                var list = document.getElementById('assertions-' + specId);
                var toggle = document.getElementById('toggle-' + specId);
                if (list) list.classList.add('expanded');
                if (toggle) { toggle.classList.add('expanded'); toggle.parentElement.classList.add('expanded'); toggle.textContent = '▼'; }
            });
            // Restore active detail if it still exists (it may have been hidden).
            if (activeId) {
                var el = document.getElementById(activeId);
                if (el) {
                    el.classList.add('active');
                    var emptyState = document.getElementById('empty-state');
                    if (emptyState) emptyState.style.display = 'none';
                }
            }
            if (treePanel) treePanel.scrollTop = scrollTop;

            // Re-apply any active search filter against the rebuilt DOM.
            var searchInput = document.getElementById('spec-search');
            if (searchInput && searchInput.value) {
                searchInput.dispatchEvent(new Event('input'));
            }
        }

        // Wire the branch dropdown: open/close, checkbox toggles, select/deselect
        // all, chip dimming, count, and persistence.
        function initializeBranchFilter() {
            if (!crossBranchMode) return;
            var toggle = document.getElementById('cb-branch-toggle');
            var menu = document.getElementById('cb-branch-menu');
            if (!toggle || !menu) return;

            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                var open = menu.hasAttribute('hidden');
                if (open) { menu.removeAttribute('hidden'); toggle.setAttribute('aria-expanded', 'true'); }
                else { menu.setAttribute('hidden', ''); toggle.setAttribute('aria-expanded', 'false'); }
            });
            // Keep clicks inside the menu from closing it.
            menu.addEventListener('click', function(e) { e.stopPropagation(); });
            document.addEventListener('click', function() {
                if (!menu.hasAttribute('hidden')) { menu.setAttribute('hidden', ''); toggle.setAttribute('aria-expanded', 'false'); }
            });

            function refreshChipsAndCount() {
                var selected = 0;
                for (var i = 0; i < crossBranchBranches.length; i++) {
                    if (cbIsSelected(crossBranchBranches[i])) selected++;
                }
                var count = document.getElementById('cb-branch-count');
                if (count) count.textContent = '(' + selected + '/' + crossBranchBranches.length + ')';
                document.querySelectorAll('.cb-branch-chip').forEach(function(chip) {
                    var b = chip.getAttribute('data-branch');
                    if (cbIsSelected(b)) chip.classList.remove('cb-chip-deselected');
                    else chip.classList.add('cb-chip-deselected');
                });
            }

            menu.addEventListener('change', function(e) {
                var cb = e.target;
                if (!cb.classList || !cb.classList.contains('cb-branch-checkbox')) return;
                var branch = cb.getAttribute('data-branch');
                if (cb.checked) delete cbDeselected[branch];
                else cbDeselected[branch] = true;
                cbSaveDeselected();
                refreshChipsAndCount();
                cbApplyBranchSelection();
            });

            menu.querySelectorAll('[data-cb-menu]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var mode = btn.getAttribute('data-cb-menu');
                    cbDeselected = {};
                    if (mode === 'none') {
                        for (var i = 0; i < crossBranchBranches.length; i++) cbDeselected[crossBranchBranches[i]] = true;
                    }
                    cbSaveDeselected();
                    menu.querySelectorAll('.cb-branch-checkbox').forEach(function(c) {
                        c.checked = cbIsSelected(c.getAttribute('data-branch'));
                    });
                    refreshChipsAndCount();
                    cbApplyBranchSelection();
                });
            });
        }

        // Build tree panel
        function buildTree() {
            var treeEl = document.getElementById('spec-tree');
            var html = '';

            for (var si = 0; si < specs.length; si++) {
                var spec = specs[si];
                // In cross-branch mode, a foreign spec disappears once all of its
                // contributing branches are deselected.
                if (crossBranchMode && !cbSpecVisible(spec)) continue;
                var specAssertions = assertionsByParent[spec.id] || [];
                var searchText = spec.id + ' ' + spec.title.toLowerCase() + ' ' + spec.status + ' ' + spec.priority;

                // Cross-branch spec summary (worst incoming state across the spec),
                // recomputed from the currently-selected branches.
                var specCbSummary = crossBranchMode ? cbSpecSummary(spec) : '';
                var specCbUnconfirmed = specCbSummary === 'conflict' && cbSpecSummaryUnconfirmed(spec);
                var specCbRowClass = specCbSummary ? ' ' + cbRowClassFor(specCbSummary, specCbUnconfirmed) : '';

                html += '<li class="spec-item" data-spec-id="' + escapeHtml(spec.id) + '" data-search-text="' + escapeHtml(searchText) + '">';
                html += '<div class="spec-header' + specCbRowClass + '" data-action="toggle-spec" data-spec-id="' + escapeHtml(spec.id) + '" data-show-detail="true" data-type="spec">';
                html += '<span class="toggle-icon" id="toggle-' + escapeHtml(spec.id) + '">\u25B6</span>';
                html += '<span class="priority-badge priority-' + spec.priority + '">' + (spec.priority || '–') + '</span>';
                html += '<span class="status-badge status-' + escapeHtml(statusClass(spec.status)) + '"></span>';
                if (specCbSummary) {
                    html += cbBadgeHtml(specCbSummary, specCbUnconfirmed);
                }
                html += '<span class="spec-title">' + escapeHtml(spec.title) + '</span>';
                html += '</div>';

                html += '<ul class="assertions-list" id="assertions-' + escapeHtml(spec.id) + '">';
                for (var ai = 0; ai < specAssertions.length; ai++) {
                    var assertion = specAssertions[ai];
                    // Hide a foreign assertion whose every contributing branch is deselected.
                    if (crossBranchMode && !cbAssertionVisible(assertion)) continue;
                    var aSearchText = assertion.id + ' ' + assertion.title.toLowerCase() + ' ' + assertion.status + ' ' + assertion.priority;

                    var aFiltered = crossBranchMode ? cbFilteredContribs(assertion) : [];
                    var aCbState = crossBranchMode ? cbWorstState(aFiltered) : '';
                    var aCbUnconfirmed = aCbState === 'conflict' && cbHasUnconfirmedConflict(aFiltered);
                    var aCbRowClass = aCbState ? ' ' + cbRowClassFor(aCbState, aCbUnconfirmed) : '';

                    html += '<li class="assertion-item' + aCbRowClass + '" data-action="show-detail" data-assertion-id="' + escapeHtml(assertion.id) + '" data-type="assertion" data-search-text="' + escapeHtml(aSearchText) + '">';
                    html += '<div style="display: flex; align-items: center;">';
                    html += '<span class="priority-badge priority-' + assertion.priority + '">' + (assertion.priority || '–') + '</span>';
                    html += '<span class="status-badge status-' + escapeHtml(statusClass(assertion.status)) + '"></span>';
                    if (aCbState) {
                        html += cbBadgeHtml(aCbState, aCbUnconfirmed);
                    }
                    html += '<span class="cb-deletable-title">' + escapeHtml(assertion.title) + '</span>';
                    html += '</div>';
                    html += '</li>';
                }
                html += '</ul>';
                html += '</li>';
            }

            treeEl.innerHTML = html;
        }

        // Build detail panels
        function buildDetailPanels() {
            var section = document.getElementById('detail-content-section');
            var html = '<div class="empty-state" id="empty-state"><h3>Spec Explorer</h3><p>Click on any spec or assertion to view details</p></div>';

            // Spec detail panels
            for (var si = 0; si < specs.length; si++) {
                var spec = specs[si];
                if (crossBranchMode && !cbSpecVisible(spec)) continue;
                html += '<div class="detail-content" id="detail-spec-' + escapeHtml(spec.id) + '">';
                html += '<div class="detail-header">';
                html += '<div class="detail-title">' + escapeHtml(spec.title) + '</div>';
                html += '<div class="detail-meta">';
                html += '<span class="meta-item">Status: <span class="detail-status-badge">' + statusEmoji(spec.status) + '</span></span>';
                html += '<span class="meta-item">Priority: <span class="detail-priority-badge">' + spec.priority + '</span></span>';
                html += '<span class="meta-item">File: <strong>' + escapeHtml(spec.file) + '</strong></span>';
                var specDetailSummary = crossBranchMode ? cbSpecSummary(spec) : '';
                if (specDetailSummary) {
                    var specSummaryUnconfirmed = specDetailSummary === 'conflict' && cbSpecSummaryUnconfirmed(spec);
                    html += '<span class="meta-item">Cross-branch: ' + cbBadgeHtml(specDetailSummary, specSummaryUnconfirmed)
                        + ' <span class="cb-contrib-label">' + escapeHtml(cbStateLabelFull(specDetailSummary, specSummaryUnconfirmed)) + '</span></span>';
                }
                html += '</div>';
                html += '</div>';
                html += cbContributionsHtml(cbFilteredContribs(spec));
                try { html += '<div class="detail-body markdown-body">' + DOMPurify.sanitize(marked.parse(spec.content || '')) + '</div>'; } catch(e) { html += '<div class="detail-body markdown-body">' + escapeHtml(spec.content || '') + '</div>'; }
                html += '</div>';
            }

            // Assertion detail panels
            for (var ai = 0; ai < assertions.length; ai++) {
                var assertion = assertions[ai];
                if (crossBranchMode && !cbAssertionVisible(assertion)) continue;
                html += '<div class="detail-content" id="detail-assertion-' + escapeHtml(assertion.id) + '" data-branch="' + escapeHtml(assertion.branch) + '">';
                html += '<div class="detail-header">';
                html += '<div class="detail-title">' + escapeHtml(assertion.title) + '</div>';
                html += '<div class="detail-meta">';
                html += '<span class="meta-item">Status: <span class="detail-status-badge">' + statusEmoji(assertion.status) + '</span></span>';
                html += '<span class="meta-item">Priority: <span class="detail-priority-badge">' + assertion.priority + '</span></span>';
                html += '<span class="meta-item">Parent: <strong>' + escapeHtml(assertion.parent) + '</strong></span>';
                html += '<span class="meta-item">Branch: <strong>' + escapeHtml(assertion.branch) + '</strong></span>';
                html += '<span class="meta-item">File: <strong>' + escapeHtml(assertion.file) + '</strong></span>';
                if (assertion.dependsOn) {
                    html += '<span class="meta-item">Depends On: <strong>' + escapeHtml(assertion.dependsOn) + '</strong></span>';
                }
                html += '</div>';
                html += '</div>';
                html += cbContributionsHtml(cbFilteredContribs(assertion));
                try { html += '<div class="detail-body markdown-body">' + DOMPurify.sanitize(marked.parse(assertion.content || '')) + '</div>'; } catch(e) { html += '<div class="detail-body markdown-body">' + escapeHtml(assertion.content || '') + '</div>'; }
                html += '</div>';
            }

            section.innerHTML = html;
        }

        // Build metro map SVGs per branch
        var metroMapCache = {};

        function getAssertionsByBranch() {
            var byBranch = {};
            for (var i = 0; i < assertions.length; i++) {
                var a = assertions[i];
                var branch = a.branch || 'main';
                if (!byBranch[branch]) {
                    byBranch[branch] = [];
                }
                byBranch[branch].push(a);
            }
            return byBranch;
        }

        var STATUS_COLORS = {
            not_started: '#64748b',
            in_progress: '#f59e0b',
            done: '#10b981',
            failed: '#ef4444',
            draft: '#94a3b8'
        };

        function generateMetroMapSVG(currentAssertionId, branchAssertions) {
            if (!branchAssertions || branchAssertions.length === 0) return '';

            var LAYER_SPACING = 120;
            var NODE_SPACING = 45;
            var TREE_GAP = 45;
            var PADDING_LEFT = 60;
            var PADDING_TOP = 30;
            var STATION_RADIUS = 8;
            var CURRENT_RADIUS = 10;
            var LABEL_OFFSET = 16;

            // Build parent-to-children map from dependsOn
            var childrenOf = {};
            var branchIds = {};
            for (var i = 0; i < branchAssertions.length; i++) {
                branchIds[branchAssertions[i].id] = true;
            }

            for (var i = 0; i < branchAssertions.length; i++) {
                var a = branchAssertions[i];
                if (a.dependsOn && branchIds[a.dependsOn]) {
                    if (!childrenOf[a.dependsOn]) {
                        childrenOf[a.dependsOn] = [];
                    }
                    childrenOf[a.dependsOn].push(a.id);
                }
            }

            // Find root nodes: no dependsOn or dependsOn not in this branch
            var roots = [];
            for (var i = 0; i < branchAssertions.length; i++) {
                var a = branchAssertions[i];
                if (!a.dependsOn || !branchIds[a.dependsOn]) {
                    roots.push(a.id);
                }
            }

            // Recursive tree layout
            var positions = {};
            var currentY = PADDING_TOP;

            function layoutTree(nodeId, depth) {
                var children = childrenOf[nodeId] || [];
                if (children.length === 0) {
                    var x = PADDING_LEFT + depth * LAYER_SPACING;
                    var y = currentY;
                    positions[nodeId] = { x: x, y: y };
                    currentY += NODE_SPACING;
                    return { minY: y, maxY: y };
                }

                var childBounds = [];
                for (var i = 0; i < children.length; i++) {
                    childBounds.push(layoutTree(children[i], depth + 1));
                }

                var firstChildMinY = childBounds[0].minY;
                var lastChildMaxY = childBounds[childBounds.length - 1].maxY;
                var centerY = (firstChildMinY + lastChildMaxY) / 2;
                var x = PADDING_LEFT + depth * LAYER_SPACING;
                positions[nodeId] = { x: x, y: centerY };

                return { minY: firstChildMinY, maxY: lastChildMaxY };
            }

            for (var ri = 0; ri < roots.length; ri++) {
                if (ri > 0) {
                    currentY += TREE_GAP;
                }
                layoutTree(roots[ri], 0);
            }

            // Determine terminal nodes (leaf nodes with no children)
            var terminalNodes = [];
            for (var i = 0; i < branchAssertions.length; i++) {
                var a = branchAssertions[i];
                if (!childrenOf[a.id] || childrenOf[a.id].length === 0) {
                    terminalNodes.push(a.id);
                }
            }

            // Calculate SVG dimensions
            var maxX = 0;
            var maxY = 0;
            for (var id in positions) {
                if (positions[id].x > maxX) maxX = positions[id].x;
                if (positions[id].y > maxY) maxY = positions[id].y;
            }

            // Add terminus column if multiple terminal nodes
            var hasTerminus = terminalNodes.length > 1;
            var terminusX = maxX + LAYER_SPACING;
            var terminusY = 0;
            if (hasTerminus) {
                var sumY = 0;
                for (var i = 0; i < terminalNodes.length; i++) {
                    sumY += positions[terminalNodes[i]].y;
                }
                terminusY = sumY / terminalNodes.length;
                maxX = terminusX;
                if (terminusY > maxY) maxY = terminusY;
            }

            var svgWidth = maxX + 300;
            var svgHeight = maxY + PADDING_TOP + 30;

            var svg = '<svg class="metro-map" width="' + svgWidth + '" height="' + svgHeight + '" viewBox="0 0 ' + svgWidth + ' ' + svgHeight + '">';

            // Draw dependency lines
            for (var i = 0; i < branchAssertions.length; i++) {
                var a = branchAssertions[i];
                if (a.dependsOn && branchIds[a.dependsOn] && positions[a.dependsOn] && positions[a.id]) {
                    var from = positions[a.dependsOn];
                    var to = positions[a.id];

                    if (from.y === to.y) {
                        svg += '<line class="metro-dependency" x1="' + from.x + '" y1="' + from.y + '" x2="' + to.x + '" y2="' + to.y + '" stroke="#94a3b8" stroke-width="3" opacity="0.4"/>';
                    } else {
                        var midX = (from.x + to.x) / 2;
                        var midY = (from.y + to.y) / 2;
                        svg += '<path class="metro-dependency" d="M' + from.x + ',' + from.y + ' Q' + midX + ',' + from.y + ' ' + midX + ',' + midY + ' T' + to.x + ',' + to.y + '" fill="none" stroke="#94a3b8" stroke-width="3" opacity="0.4"/>';
                    }
                }
            }

            // Draw terminus lines
            if (hasTerminus) {
                for (var i = 0; i < terminalNodes.length; i++) {
