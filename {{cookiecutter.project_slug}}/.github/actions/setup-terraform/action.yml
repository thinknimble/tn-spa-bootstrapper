{% raw %}
name: 'Setup Terraform'
description: 'Install Terraform, initialize backend, and manage workspace'
inputs:
  environment:
    description: 'Environment name'
    required: true
  service_name:
    description: 'Service name'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ~1.0

    - name: Terraform Init with Backend
      shell: bash
      run: |
        cd terraform
        echo "🔧 Initializing Terraform backend for environment: ${{ inputs.environment }}"

        # Auto-detect backend config file (account-specific or default)
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "")
        BACKEND_FILE=""
        if [[ -n "$ACCOUNT_ID" && -f "backend-${ACCOUNT_ID}.hcl" ]]; then
          BACKEND_FILE="backend-${ACCOUNT_ID}.hcl"
          echo "📋 Using account-specific backend config: $BACKEND_FILE"
        elif [[ -f "backend.hcl" ]]; then
          BACKEND_FILE="backend.hcl"
          echo "📋 Using default backend config: $BACKEND_FILE"
        else
          echo "❌ No backend configuration found (backend.hcl or backend-{account-id}.hcl)"
          exit 1
        fi

        STATE_KEY="${{ inputs.environment }}/terraform.tfstate"
        terraform init \
          -backend-config="$BACKEND_FILE" \
          -backend-config="key=${STATE_KEY}"

    - name: Check if Terraform workspace exists
      id: workspace-check
      shell: bash
      run: |
        cd terraform
        if terraform workspace list | grep -q "${{ inputs.environment }}"; then
          echo "workspace_exists=true" >> $GITHUB_OUTPUT
          echo "✅ Workspace '${{ inputs.environment }}' exists"
        else
          echo "workspace_exists=false" >> $GITHUB_OUTPUT
          echo "ℹ️  Workspace '${{ inputs.environment }}' does not exist"
        fi

    - name: Create or select Terraform workspace
      shell: bash
      run: |
        cd terraform
        if [ "${{ steps.workspace-check.outputs.workspace_exists }}" = "true" ]; then
          echo "Selecting existing workspace: ${{ inputs.environment }}"
          terraform workspace select ${{ inputs.environment }}
        else
          echo "Creating new workspace: ${{ inputs.environment }}"
          terraform workspace new ${{ inputs.environment }}
        fi
        echo "✅ Using Terraform workspace: ${{ inputs.environment }}"
{% endraw %}
