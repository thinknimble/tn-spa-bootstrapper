{% raw %}name: Deploy Application

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - teardown
      environment:
        description: 'Environment to deploy to or tear down'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  id-token: write
  contents: read
  pull-requests: write
  deployments: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  GH_TOKEN: ${{ github.token }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    concurrency:
      group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'staging') || 'dev' }}
      cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup-env
        uses: ./.github/actions/setup-environment
        with:
          manual_environment: ${{ github.event.inputs.environment }}
          aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Setup AWS
        uses: ./.github/actions/setup-aws
        with:
          account_id: ${{ steps.setup-env.outputs.account_id }}
          role_arn: ${{ steps.setup-env.outputs.role_arn }}
          aws_region: ${{ env.AWS_REGION }}
          ecr_repository_name: ${{ vars.ECR_REPOSITORY_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}-app' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./compose/server/tf/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.setup-env.outputs.ecr_registry }}/${{ vars.ECR_REPOSITORY_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}-app' }}:${{ steps.setup-env.outputs.image_tag }}
            ${{ steps.setup-env.outputs.ecr_registry }}/${{ vars.ECR_REPOSITORY_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}-app' }}:${{ steps.setup-env.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Deployment
        id: deployment
        run: |
          echo "Creating deployment for environment: ${{ steps.setup-env.outputs.environment }}"

          DEPLOYMENT_ID=$(echo '{"ref":"${{ github.sha }}","environment":"${{ steps.setup-env.outputs.environment }}","description":"Deploy to ${{ steps.setup-env.outputs.environment }}","auto_merge":false,"required_contexts":[]}' \
            | gh api repos/${{ github.repository }}/deployments --method POST --input - --jq '.id')

          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
        with:
          environment: ${{ steps.setup-env.outputs.environment }}
          service_name: ${{ vars.SERVICE_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}' }}

      - name: Generate Terraform Variables
        uses: ./.github/actions/generate-terraform-vars
        with:
          environment: ${{ steps.setup-env.outputs.environment }}
          aws_region: ${{ steps.setup-env.outputs.aws_region }}
          base_domain: ${{ steps.setup-env.outputs.base_domain }}
          use_custom_domain: ${{ steps.setup-env.outputs.use_custom_domain }}
          custom_domain: ${{ steps.setup-env.outputs.custom_domain }}
          route53_zone_id: ${{ steps.setup-env.outputs.route53_zone_id }}
          certificate_arn: ${{ steps.setup-env.outputs.certificate_arn }}
          service_name: ${{ vars.SERVICE_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}' }}
          ecr_repository_name: ${{ vars.ECR_REPOSITORY_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}-app' }}

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -out=tfplan
          echo "has_changes=$( [ -s tfplan ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        if: github.event_name != 'pull_request' && steps.plan.outputs.has_changes == 'true'
        run: |
          cd terraform
          terraform apply tfplan

      - name: Get Application URL
        id: app-url
        run: |
          cd terraform
          APP_URL=$(terraform output -raw application_url 2>/dev/null || true)
          # Strip any Terraform warning text that isn't a URL
          [[ "$APP_URL" != http* ]] && APP_URL=""
          if [[ -n "$APP_URL" ]]; then
            echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
            echo "✅ Application URL: $APP_URL"
          fi

      - name: Add PR Comment
        if: github.event_name == 'pull_request'
        run: |
          APP_URL="${{ steps.app-url.outputs.app_url }}"
          COMMENT_BODY="🚀 **Deployment Preview**

          **Environment:** \`${{ steps.setup-env.outputs.environment }}\`
          **Application URL:** ${APP_URL:-_URL will be available after infrastructure deployment_}

          The environment will be automatically updated with each new commit to this PR."

          gh pr comment ${{ github.event.number }} --body "$COMMENT_BODY"

      - name: Update deployment status
        if: always() && steps.deployment.outputs.deployment_id
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            DEPLOYMENT_STATE="success"
            DESCRIPTION="Deployment completed successfully"
          else
            DEPLOYMENT_STATE="failure"
            DESCRIPTION="Deployment failed"
          fi

          gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses \
            --method POST \
            --field state="$DEPLOYMENT_STATE" \
            --field description="$DESCRIPTION" \
            --field environment_url="${{ steps.app-url.outputs.app_url }}" \
            --field auto_inactive=true

  cleanup-pr-environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pr-${{ github.event.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup-env
        uses: ./.github/actions/setup-environment
        with:
          aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Setup AWS
        uses: ./.github/actions/setup-aws
        with:
          account_id: ${{ steps.setup-env.outputs.account_id }}
          role_arn: ${{ steps.setup-env.outputs.role_arn }}
          aws_region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
        with:
          environment: ${{ steps.setup-env.outputs.environment }}
          service_name: ${{ vars.SERVICE_NAME }}

      - name: Destroy PR Environment
        run: |
          cd terraform
          PR_WORKSPACE="${{ steps.setup-env.outputs.environment }}"

          if terraform workspace list | grep -q "$PR_WORKSPACE"; then
            terraform workspace select "$PR_WORKSPACE"
            echo "🗑️ Destroying infrastructure for environment: $PR_WORKSPACE"
            terraform destroy -auto-approve
            terraform workspace select default
            terraform workspace delete "$PR_WORKSPACE"
            echo "✅ Cleaned up PR environment: $PR_WORKSPACE"
          else
            echo "ℹ️  No workspace found for PR environment: $PR_WORKSPACE"
          fi

  teardown-environment:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'teardown'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'production' && 'production-teardown' || github.event.inputs.environment }}
    concurrency:
      group: deploy-${{ github.event.inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup-env
        uses: ./.github/actions/setup-environment
        with:
          manual_environment: ${{ github.event.inputs.environment }}
          aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}


      - name: Setup AWS
        uses: ./.github/actions/setup-aws
        with:
          account_id: ${{ steps.setup-env.outputs.account_id }}
          role_arn: ${{ steps.setup-env.outputs.role_arn }}
          aws_region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
        with:
          environment: ${{ steps.setup-env.outputs.environment }}
          service_name: ${{ vars.SERVICE_NAME || '{% endraw %}{{cookiecutter.sanitized_tf_service_name}}{% raw %}' }}

      - name: Confirm and Destroy Environment
        run: |
          cd terraform
          ENVIRONMENT="${{ steps.setup-env.outputs.environment }}"

          if terraform workspace list | grep -q "$ENVIRONMENT"; then
            terraform workspace select "$ENVIRONMENT"
            echo "🗑️ Destroying infrastructure for environment: $ENVIRONMENT"
            echo "⚠️  This will permanently delete all resources in the $ENVIRONMENT environment"

            if terraform destroy -auto-approve; then
              echo "✅ Successfully destroyed infrastructure for environment: $ENVIRONMENT"
              terraform workspace select default
              terraform workspace delete "$ENVIRONMENT"
            else
              echo "❌ Failed to destroy infrastructure for environment: $ENVIRONMENT"
              exit 1
            fi
          else
            echo "ℹ️  No workspace found for environment: $ENVIRONMENT"
          fi{% endraw %}
