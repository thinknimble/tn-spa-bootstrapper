volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}

services:
  postgres:
    container_name: ${PROJECT}-postgres
    restart: always
    image: postgres:16
    env_file:
      - ".env"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - local_postgres_data:/var/lib/postgresql/data/
      - local_postgres_data_backups:/backups

  redis:
    container_name: ${PROJECT}-redis
    image: "redis:latest"

  server:
    container_name: ${PROJECT}-server
    build:
      context: .
      dockerfile: ./compose/server/Dockerfile
    restart: always
    command: /start
    volumes:
      - .:/app
    depends_on:
      - postgres
    env_file:
      - ".env"
    environment:
      - DB_HOST=postgres
    user: ${DOCKER_UID}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT}-api.rule=Host(`api.${PROJECT}.localhost`)"
      - "traefik.http.routers.${PROJECT}-api.entrypoints=web"
      - "traefik.http.services.${PROJECT}-api.loadbalancer.server.port=8000"

  client:
    container_name: ${PROJECT}-client
    build:
      context: .
      dockerfile: ./compose/client/Dockerfile
    volumes:
      - ".:/app"
      # This line avoids copying local node_modules folder to the Docker container, and uses the ones installed during build
      - "/app/client/node_modules"
    environment:
      - CHOKIDAR_USEPOLLING=true
      {% if cookiecutter.client_app == 'React' %}
      - VITE_CACHE_DIR=./vite
      {% endif %}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT}-web.rule=Host(`${PROJECT}.localhost`)"
      - "traefik.http.routers.${PROJECT}-web.entrypoints=web"
      - "traefik.http.services.${PROJECT}-web.loadbalancer.server.port=8080"
