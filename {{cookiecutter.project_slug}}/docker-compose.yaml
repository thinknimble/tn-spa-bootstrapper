volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}

services:
  postgres:
    container_name: ${PROJECT}-postgres
    restart: always
    image: postgres:16
    env_file:
      - ".env"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - local_postgres_data:/var/lib/postgresql/data/
      - local_postgres_data_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: ${PROJECT}-redis
    image: "redis:latest"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    container_name: ${PROJECT}-server
    build:
      context: .
      dockerfile: ./compose/server/Dockerfile
    restart: always
    command: /start
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ".env"
    environment:
      - DB_HOST=postgres
    user: ${DOCKER_UID}

  client:
    container_name: ${PROJECT}-client
    build:
      context: .
      dockerfile: ./compose/client/Dockerfile
    volumes:
      - ".:/app"
      # This line avoids copying local node_modules folder to the Docker container, and uses the ones installed during build
      - "/app/client/node_modules"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_DEV_BACKEND_URL=http://server:8000
      {% if cookiecutter.client_app == 'React' %}
      - VITE_CACHE_DIR=./vite
      {% endif %}
