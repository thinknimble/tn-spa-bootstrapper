repos:
  # Python linting with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^server/
      - id: ruff-format
        files: ^server/

  # confirm that Django migrations are up to date and have no merge conflicts
  - repo: local
    hooks:
    -   id: check-migrations
        name: Check Django Migrations
        entry: python server/manage.py makemigrations --check --dry-run
        language: system
        pass_filenames: false
        
  - repo: local
    hooks:
    -   id: check-migrations-merge-conflicts
        name: Check Django Migrations Merge Conflicts
        entry: python server/manage.py makemigrations --merge --dry-run
        language: system
        pass_filenames: false


  # Frontend linting and formatting for React web client
  - repo: local
    hooks:
      - id: web-prettier
        name: Web Client Prettier Format
        entry: sh -c 'cd client && npm run format:write'
        language: system
        files: ^client/.*\.(js|jsx|ts|tsx|css|scss|json|md)$
        pass_filenames: false

      - id: web-lint
        name: Web Client ESLint
        entry: sh -c 'cd client && npm run eslint'
        language: system
        files: ^client/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false

      - id: web-typecheck
        name: Web Client TypeScript Check
        entry: sh -c 'cd client && npm run tslint'
        language: system
        files: ^client/.*\.(ts|tsx)$
        pass_filenames: false

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
